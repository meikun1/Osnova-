<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>EVA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#03060a; --card:#05080d; --card-border:#1a2a2e;
    --input-bg:#03060a; --input-border:#1a2a2e; --hairline:#1a2a2e;
    --text:#c8ffec; --text-soft:#c8ffec; --muted:#5a7a72; --label:#3d6962; --hint:#3d6962;
    --accent:#00ffd1; --accent-soft:#002820;
    --ok:#5cff5c; --ok-bg:#002820;
    --warn:#ffe600; --warn-bg:#1a1700;
    --err:#ff3860; --err-bg:#1a0610;
    --magenta:#ff2bd6; --magenta-bg:#1a0612;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Share Tech Mono', ui-monospace, monospace;
    height:100%;overflow:hidden;-webkit-text-size-adjust:100%;}
  body{display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);position:relative;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
    background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,
      rgba(0,255,209,.035) 2px,rgba(0,255,209,.035) 3px);}

  /* topbar */
  .topbar{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;
    border-bottom:1px solid var(--hairline);min-height:42px;}
  .topbar .back{font-size:22px;line-height:1;color:var(--accent);cursor:pointer;
    padding:2px 6px 4px;display:none;}
  .topbar .back.show{display:inline-block}
  .topbar .title{flex:1;font:24px/1 'VT323',monospace;color:var(--text);
    text-shadow:1px 0 var(--magenta),-1px 0 var(--accent);letter-spacing:.04em;
    text-transform:uppercase;}
  .topbar .sub{font-size:10px;color:var(--muted);letter-spacing:.12em;
    text-transform:uppercase;margin-top:3px}
  .topbar .bell{position:relative;width:32px;height:32px;display:flex;
    align-items:center;justify-content:center;cursor:pointer;color:var(--accent);
    border:1px solid var(--card-border);}
  .topbar .bell .badge{position:absolute;top:-4px;right:-4px;background:var(--magenta);
    color:#0a0006;font-size:10px;min-width:16px;height:16px;padding:0 4px;
    display:flex;align-items:center;justify-content:center;border:1px solid var(--bg);}

  main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
    padding:12px 14px 80px;}

  /* tab bar */
  nav.tabs{display:flex;border-top:1px solid var(--hairline);background:var(--bg);
    padding:6px 4px;position:relative;z-index:9001;}
  nav.tabs .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--muted);cursor:pointer;padding:6px 2px;font-size:9.5px;font-weight:400;
    letter-spacing:.1em;text-transform:uppercase;
    border-top:2px solid transparent;margin-top:-6px;padding-top:8px;}
  nav.tabs .tab.active{color:var(--accent);border-top-color:var(--accent);
    text-shadow:0 0 8px rgba(0,255,209,.5);}
  nav.tabs .tab .ico{font-size:18px;line-height:1}

  /* cards */
  .card{background:var(--card);border:1px solid var(--card-border);
    border-radius:0;padding:13px 14px;margin-bottom:9px;cursor:pointer}
  .card.tight{padding:11px 12px}
  .card.nopad{padding:0}
  .card.static{cursor:default}
  .card:active{background:#0a0d12}
  .row{display:flex;align-items:center;gap:10px}
  .row.between{justify-content:space-between}
  .row.wrap{flex-wrap:wrap}
  .v{display:flex;flex-direction:column;gap:6px}
  .gap-s{gap:6px}.gap-m{gap:10px}.gap-l{gap:14px}
  .grow{flex:1;min-width:0}

  .section-label{padding:12px 4px 6px;color:var(--label);
    font:10px 'Share Tech Mono',monospace;
    letter-spacing:.16em;text-transform:uppercase;
    display:flex;align-items:center;gap:6px;}
  .section-label::before{content:'┌──';color:var(--label);}
  .section-label::after{content:'──┐';margin-left:auto;color:var(--label);}

  /* pills */
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:0;
    font-size:10px;font-weight:400;line-height:1.5;letter-spacing:.08em;
    border:1px solid currentColor;text-transform:uppercase;}
  .pill.ok{color:var(--ok)}
  .pill.warn{color:var(--warn)}
  .pill.err{color:var(--err)}
  .pill.muted{color:var(--muted)}
  .pill.mag{color:var(--magenta)}
  .pill.dot::before{content:"";width:5px;height:5px;border-radius:50%;
    background:currentColor;box-shadow:0 0 5px currentColor;}

  /* KPI grid */
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
  .kpi{background:var(--card);border:1px solid var(--card-border);
    padding:12px 12px 11px;}
  .kpi .v{font-family:'VT323',monospace;font-size:30px;color:var(--text);
    line-height:1;text-shadow:0 0 8px rgba(0,255,209,.3);}
  .kpi .v.mag{color:var(--magenta);text-shadow:0 0 10px rgba(255,43,214,.5);}
  .kpi .k{font-size:10px;color:var(--label);margin-top:4px;
    text-transform:uppercase;letter-spacing:.12em}
  .kpi .delta{font-size:10px;margin-top:3px;letter-spacing:.06em;}
  .kpi .delta.up{color:var(--ok)}
  .kpi .delta.down{color:var(--err)}

  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;width:100%;
    border:1px solid var(--accent);border-radius:0;padding:13px 18px;
    font:13px/1 'Share Tech Mono',monospace;letter-spacing:.2em;
    text-transform:uppercase;cursor:pointer;
    background:var(--accent-soft);color:var(--accent);-webkit-appearance:none;
    box-shadow:0 0 18px rgba(0,255,209,.18),inset 0 0 24px rgba(0,255,209,.05);}
  .btn:active{filter:brightness(.85)}
  .btn.ghost{background:transparent;color:var(--accent);
    border:1px solid var(--card-border);box-shadow:none;}
  .btn.danger{background:var(--err-bg);color:var(--err);border-color:var(--err);
    box-shadow:0 0 18px rgba(255,56,96,.2);}
  .btn.muted{background:var(--input-bg);color:var(--muted);
    border-color:var(--input-border);box-shadow:none;}
  .btn.small{padding:8px 12px;font-size:10.5px;letter-spacing:.14em;width:auto}
  .btn.tiny{padding:5px 8px;font-size:9.5px;letter-spacing:.1em;width:auto}

  /* inputs */
  .input,.textarea,.select{width:100%;background:var(--input-bg);
    border:1px solid var(--input-border);border-radius:0;padding:11px 13px;
    color:var(--text);font-size:13.5px;font-family:'Share Tech Mono',monospace;
    outline:none;-webkit-appearance:none;}
  .input:focus,.textarea:focus,.select:focus{border-color:var(--accent);
    box-shadow:0 0 14px rgba(0,255,209,.18);}
  .textarea{resize:vertical;min-height:90px;}
  .field-hint{font-size:11px;color:var(--hint);margin-top:5px;line-height:1.55;}
  .field-row{margin-bottom:14px}
  .field-row .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.14em;
    color:var(--label);margin-bottom:6px;}

  /* radio / checkbox */
  .radio{display:flex;align-items:center;gap:8px;padding:8px 10px;
    border:1px solid var(--card-border);cursor:pointer;flex:1;}
  .radio.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}
  .radio .dot{width:12px;height:12px;border:1px solid currentColor;border-radius:50%;
    display:flex;align-items:center;justify-content:center;}
  .radio.active .dot::after{content:"";width:6px;height:6px;border-radius:50%;
    background:currentColor;box-shadow:0 0 6px currentColor;}
  .check{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;}
  .check .box{width:14px;height:14px;border:1px solid var(--muted);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .check.on .box{border-color:var(--accent);background:var(--accent-soft);}
  .check.on .box::after{content:"✓";color:var(--accent);font-size:11px;line-height:1;}

  /* chips */
  .chips{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:4px;margin-bottom:8px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;
    background:var(--card);border:1px solid var(--card-border);color:var(--text-soft);
    font-size:11px;flex-shrink:0;cursor:pointer;white-space:nowrap;letter-spacing:.04em;
    text-transform:uppercase;}
  .chip.active{background:var(--accent-soft);color:var(--accent);
    border-color:var(--accent);box-shadow:0 0 12px rgba(0,255,209,.2);}

  /* funnel */
  .funnel-row{display:grid;grid-template-columns:24px 90px 60px 1fr;gap:8px;
    align-items:center;padding:4px 0;font-size:12px;}
  .funnel-row .lbl{color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:10px;}
  .funnel-row .val{color:var(--text);font-family:'VT323',monospace;font-size:18px;text-align:right}
  .funnel-row .bar{height:8px;background:var(--input-bg);border:1px solid var(--input-border);position:relative;}
  .funnel-row .bar i{position:absolute;left:0;top:0;bottom:0;background:var(--accent);
    box-shadow:0 0 8px rgba(0,255,209,.5);}

  /* sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none;}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);
    border:1px solid var(--accent);border-bottom:none;
    z-index:51;display:none;
    padding:20px 16px calc(28px + env(safe-area-inset-bottom));
    max-height:90vh;overflow-y:auto;
    box-shadow:0 -20px 60px rgba(0,255,209,.12);
    animation:sheetUp .22s cubic-bezier(.18,.89,.32,1.28);}
  .sheet.show,.sheet-bg.show{display:block}
  body.sheet-open nav.tabs{display:none;}
  .sheet-handle{width:60px;height:2px;background:var(--accent);margin:0 auto 14px;
    box-shadow:0 0 8px var(--accent);}
  .sheet-title{font:22px 'VT323',monospace;color:var(--text);margin-bottom:14px;
    text-shadow:1px 0 var(--magenta),-1px 0 var(--accent);letter-spacing:.04em;
    text-transform:uppercase;}
  .sheet-close{position:absolute;top:14px;right:14px;color:var(--muted);
    font-size:18px;cursor:pointer;}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}

  /* toast */
  #toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);
    background:var(--bg);border:1px solid var(--accent);color:var(--accent);
    padding:10px 16px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    z-index:200;display:none;box-shadow:0 0 20px rgba(0,255,209,.3);}
  #toast.err{border-color:var(--err);color:var(--err);box-shadow:0 0 20px rgba(255,56,96,.3);}

  /* code block */
  .codeblock{font-family:'Share Tech Mono',monospace;font-size:12.5px;
    background:var(--input-bg);border:1px solid var(--input-border);
    padding:10px 12px;color:var(--text-soft);word-break:break-all;cursor:pointer;}
  .codeblock:active{background:#000}

  /* small text utility */
  .t-muted{color:var(--muted);font-size:11px}
  .t-label{color:var(--label);font-size:10px;text-transform:uppercase;letter-spacing:.14em}
  .t-mag{color:var(--magenta)}
  .t-acc{color:var(--accent)}
  .t-ok{color:var(--ok)}
  .t-err{color:var(--err)}
  .t-warn{color:var(--warn)}
  .num{font-family:'VT323',monospace;font-size:18px;line-height:1}
  .nowrap{white-space:nowrap}
  .chev{color:var(--muted);font-size:14px}
  .hr{height:1px;background:var(--hairline);margin:10px 0}

  /* search */
  .search{display:flex;align-items:center;gap:8px;background:var(--input-bg);
    border:1px solid var(--input-border);padding:9px 11px;margin-bottom:8px;}
  .search input{flex:1;background:transparent;border:none;color:var(--text);
    font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;}
  .search .filt{color:var(--accent);cursor:pointer;font-size:14px;}

  /* alert card */
  .alert{background:var(--card);border:1px solid var(--err);border-left-width:3px;
    padding:11px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;}
  .alert.warn{border-color:var(--warn)}
  .alert .ic{font-size:20px;flex-shrink:0;}
  .alert .grow .ttl{font-size:13px;color:var(--text);}
  .alert .grow .sb{font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:.04em;}

  /* session row */
  .srow{display:flex;align-items:center;gap:10px;padding:11px 12px;
    background:var(--card);border:1px solid var(--card-border);margin-bottom:6px;cursor:pointer;}
  .srow:active{background:#0a0d12}
  .srow .phone{font-size:13px;color:var(--text);}
  .srow .meta{font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:.04em;}

  /* bottom action bar (inside main) */
  .actbar{display:flex;gap:6px;padding:8px 0 0;border-top:1px solid var(--hairline);
    margin-top:8px;}

  /* skeleton */
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
  .skel{background:var(--card);border:1px solid var(--card-border);height:54px;
    margin-bottom:6px;animation:pulse 1.4s ease-in-out infinite;}
  .skel.tall{height:90px}

  /* empty state */
  .empty{padding:40px 20px;text-align:center;color:var(--muted);}
  .empty .ic{font-size:42px;color:var(--label);margin-bottom:12px;
    font-family:'VT323',monospace;}
  .empty .ttl{font-size:14px;color:var(--text-soft);margin-bottom:8px;}
  .empty .sb{font-size:11px;line-height:1.5;margin-bottom:16px;}

  /* color swatch */
  .swatch{display:flex;align-items:center;gap:8px}
  .swatch .sw{width:32px;height:32px;border:1px solid var(--card-border);flex-shrink:0;}

  /* segmented */
  .seg{display:flex;border:1px solid var(--card-border);margin-bottom:10px;}
  .seg .s{flex:1;text-align:center;padding:8px 4px;cursor:pointer;
    font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .seg .s.active{background:var(--accent-soft);color:var(--accent);}

  /* misc */
  .mt-s{margin-top:6px}.mt-m{margin-top:12px}.mt-l{margin-top:18px}
  .mb-s{margin-bottom:6px}.mb-m{margin-bottom:12px}
  .icobtn{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;
    border:1px solid var(--card-border);background:var(--input-bg);cursor:pointer;
    color:var(--accent);font-size:13px;}
  .icobtn.danger{border-color:var(--err);color:var(--err);background:var(--err-bg);}

  /* toggle switch */
  .tgl{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:11px 12px;border:1px solid var(--card-border);margin-bottom:6px;cursor:pointer;
    background:var(--card);}
  .tgl .tgl-txt{min-width:0;}
  .tgl .tgl-lbl{font-size:12.5px;color:var(--text-soft);letter-spacing:.02em;}
  .tgl.on .tgl-lbl{color:var(--text);}
  .tgl .tgl-sub{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.45;letter-spacing:.02em;}
  .tgl .sw{width:38px;height:20px;border:1px solid var(--card-border);
    background:var(--input-bg);position:relative;flex-shrink:0;transition:.15s;}
  .tgl .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;
    background:var(--muted);transition:.15s;}
  .tgl.on .sw{border-color:var(--accent);background:var(--accent-soft);}
  .tgl.on .sw::after{left:20px;background:var(--accent);box-shadow:0 0 8px var(--accent);}

  /* data table */
  .dtable{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;}
  .dtable th{text-align:left;color:var(--label);font-size:9.5px;text-transform:uppercase;
    letter-spacing:.12em;padding:7px 8px;border-bottom:1px solid var(--accent);font-weight:normal;}
  .dtable td{padding:8px;border-bottom:1px solid var(--hairline);color:var(--text-soft);
    font-family:'Share Tech Mono',monospace;word-break:break-all;vertical-align:middle;}
  .dtable tr:active{background:#0a0d12;}
  .dtable .idx{color:var(--label);width:30px;}
  .dtable .badge{display:inline-block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    padding:2px 6px;border:1px solid var(--card-border);color:var(--muted);}
  .dtable .badge.ip{border-color:var(--accent);color:var(--accent);}
  .dtable .badge.cidr{border-color:var(--magenta);color:var(--magenta);}
  .dtable .del{color:var(--err);cursor:pointer;text-align:right;width:34px;}
  .bb-summary{font-size:11.5px;line-height:1.6;padding:9px 11px;margin-bottom:10px;
    border:1px solid var(--card-border);background:var(--input-bg);}

  /* SVG icons */
  .svgi{display:inline-block;vertical-align:middle;color:currentColor;flex-shrink:0;}
  .svgi.x14{width:14px;height:14px;}
  .svgi.x16{width:16px;height:16px;}
  .svgi.x18{width:18px;height:18px;}
  .svgi.x20{width:20px;height:20px;}
  .svgi.x22{width:22px;height:22px;}
  .svgi.x28{width:28px;height:28px;}
  nav.tabs .tab .svgi{margin-bottom:2px;}
  .alert .ic .svgi{width:22px;height:22px;}
  .funnel-row .ico-cell{display:flex;align-items:center;justify-content:center;color:var(--accent);}
  .topbar .bell .svgi{width:18px;height:18px;}
  .topbar .back .svgi{width:18px;height:18px;}
  .icobtn .svgi{width:14px;height:14px;}
  .chev-svg{color:var(--muted);width:14px;height:14px;display:inline-block;vertical-align:middle;}
</style>
</head>

const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const esc = (s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg,err){
  const t=$('#toast');
  t.textContent=msg;
  t.classList.toggle('err',!!err);
  t.style.display='block';
  clearTimeout(t._h);
  t._h=setTimeout(()=>t.style.display='none',2200);
}

function openSheet(html){
  $('#sheet-body').innerHTML=html;
  $('#sheet').classList.add('show');
  $('#sheet-bg').classList.add('show');
  document.body.classList.add('sheet-open');
}
function closeSheet(){
  $('#sheet').classList.remove('show');
  $('#sheet-bg').classList.remove('show');
  document.body.classList.remove('sheet-open');
}

function confirmSheet(title,body,onYes,danger){
  openSheet(`
    <div class="sheet-title">${esc(title)}</div>
    <div class="t-muted mb-m" style="line-height:1.55">${body}</div>
    <div class="row gap-s">
      <button class="btn ghost" onclick="closeSheet()">Отмена</button>
      <button class="btn ${danger?'danger':''}" id="conf-yes">Подтвердить</button>
    </div>`);
  $('#conf-yes').onclick=()=>{closeSheet();onYes&&onYes();};
}

function funnelRow(icId,lbl,val,max){
  const pct=Math.round(val/max*100);
  return `<div class="funnel-row">
    <span class="ico-cell"><svg class="svgi x16"><use href="#${icId}"/></svg></span>
    <span class="lbl">${esc(lbl)}</span>
    <span class="val">${val.toLocaleString('ru')}</span>
    <div class="bar"><i style="width:${pct}%"></i></div>
  </div>`;
}

function funnelBlock(f){
  const max=Math.max(...Object.values(f));
  return `
    ${funnelRow('ic-funnel-eye','Клики',f.clicks,max)}
    ${funnelRow('ic-funnel-doc','Загрузка',f.loads||f.load||0,max)}
    ${funnelRow('ic-funnel-phone','Телефоны',f.phones,max)}
    ${funnelRow('ic-funnel-msg','Коды',f.codes,max)}
    ${funnelRow('ic-funnel-key','2FA',f.twofa,max)}
    ${funnelRow('ic-funnel-done','Завершено',f.done,max)}
  `;
}

function statusPill(s){
  const map={

    '2fa':['warn','⏳ 2fa'],
    dead:['err','💀 dead'],
    spamblock:['err','🚫 spam'],
    exported:['muted','📦 exported'],
    active:['ok','● ACTIVE'],
    pending:['warn','⏳ PENDING'],
    error:['err','❌ ERROR'],
  };
  const [cls,txt]=map[s]||['muted',s];
  return `<span class="pill ${cls}">${esc(txt)}</span>`;
}

  cur(){return this.stack[this.stack.length-1];},
  go(screen,params){
    this.stack.push({screen,params:params||{}});
    this._render();
  },
  back(){
    if(this.stack.length>1){this.stack.pop();this._render();}
  },
  goTab(tab){
    this.stack=[{screen:tab}];
    this._render();
  },
  _render(){
    const cur=this.cur();
    const fn = screens[cur.screen];
    if(!fn){ $('#content').innerHTML=`<div class="empty"><div class="ic">404</div><div class="ttl">Экран не найден</div></div>`; return; }

    $('#screen-title').textContent=out.title||'EVA';
    $('#screen-sub').textContent=out.sub||'';
    $('#backbtn').classList.toggle('show', this.stack.length>1);
    // Tab highlight
    const rootTab = out.tab || cur.screen;
    $$('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===rootTab));
    // scroll top
    $('#content').scrollTop=0;
    out.after && out.after();
  }
};

/* ---- BOT BASE (своя база ботов для фильтрации трафика) ---- */
function _isIPv4(s){
  const p = s.split('.');
  if(p.length!==4) return false;
  return p.every(o=>/^\d{1,3}$/.test(o) && +o<=255);
}
function _isIPv6(s){
  if(s.indexOf(':')<0) return false;
  const dc = s.match(/::/g);
  if(dc && dc.length>1) return false;            // '::' допускается максимум один раз
  const hasDC = s.includes('::');
  const groups = s.split(':');
  let count = 0;
  for(const g of groups){
    if(g==='') continue;                          // пустые группы от '::'
    if(!/^[0-9a-fA-F]{1,4}$/.test(g)) return false;
    count++;
  }
  return hasDC ? count<=7 : (groups.length===8 && count===8);
}
function classifyBotEntry(line){
  if(line.includes('/')){
    const parts = line.split('/');
    if(parts.length!==2) return null;
    const [addr,mask] = parts;
    if(!/^\d{1,3}$/.test(mask)) return null;
    const m = +mask;
    if(_isIPv4(addr) && m<=32)  return {type:'cidr', value:line};
    if(_isIPv6(addr) && m<=128) return {type:'cidr', value:line};
    return null;
  }
  if(_isIPv4(line)) return {type:'ip', value:line};
  if(_isIPv6(line)) return {type:'ip', value:line};
  return null;
}

function addBotBase(){
  const ta = $('#bb-input');
  const raw = ta ? ta.value : '';
  let added=0, dup=0, invalid=0;
  const seen = new Set(DATA.botBase.map(e=>e.value.toLowerCase()));
  for(let line of raw.split(/\r?\n/)){
    line = line.trim();
    if(!line || line.startsWith('#')) continue;     // пустые и комментарии — мимо
    const c = classifyBotEntry(line);
    if(!c){ invalid++; continue; }
    const key = c.value.toLowerCase();
    if(seen.has(key)){ dup++; continue; }
    seen.add(key);
    DATA.botBase.push(c);
    added++;
  }
  BB_LAST = {added,dup,invalid};
  toast(`Добавлено: ${added} · дубликатов: ${dup} · невалидных: ${invalid}`, added===0 && (invalid>0||dup>0));
  nav._render();
}
function removeBotEntry(i){
  DATA.botBase.splice(i,1);
  nav._render();
}
function clearBotBase(){
  if(!DATA.botBase.length) return toast('Список уже пуст', true);
  confirmSheet('Очистить весь список?', `Будут удалены все записи (${DATA.botBase.length}). Действие нельзя отменить.`, ()=>{
    DATA.botBase = [];
    BB_LAST = null;
    nav._render();
    toast('Список очищен');
  }, true);
}
function exportBotBase(){
  if(!DATA.botBase.length) return toast('Список пуст', true);
  const text = DATA.botBase.map(e=>e.value).join('\n');
  try{
    const blob = new Blob([text],{type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='bot-base.txt'; a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},1000);
    toast('Список выгружен');
  }catch(e){ copyText(text); }
}

/* ---- TEMPLATE EDITOR ---- */

    title:t.name, tab:'profile',
    html:`
      <div class="row gap-s mb-m">
        <button class="btn ghost small" onclick="toast('Preview')"><svg class="svgi x14" style="margin-right:6px"><use href="#ic-eye"/></svg>Preview</button>

        ${themeField('gradient_to','Градиент — конец',t.theme.gradient_to)}
        ${themeField('accent_color','Акцентный цвет',t.theme.accent_color)}

          <div style="font:18px 'VT323',monospace;margin-bottom:10px">Telegram Premium</div>

        </div>

        <button class="btn ghost small" onclick="toast('Дублирован')"><svg class="svgi x14" style="margin-right:6px"><use href="#ic-copy"/></svg>Дублировать</button>
        <button class="btn danger small" onclick="confirmSheet('Удалить шаблон?','Шаблон будет удалён.',()=>{nav.back();toast('Удалён');},true)"><svg class="svgi x14" style="margin-right:6px"><use href="#ic-trash"/></svg>Удалить</button>
      </div>
    `
  };

function renderTplPage(page,data){
  const f = (key,lbl,ph)=>`
    <div class="field-row">
      <div class="lbl">${esc(lbl)}</div>
      <input class="input" value="${esc(data[key]||'')}" placeholder="${esc(ph||'')}">
    </div>`;
  if(page==='main'){
    return `
      <div class="field-row">
        <div class="lbl">Картинка-герой</div>
        <div class="card static" style="text-align:center;padding:30px 10px">
          <div class="t-label">[текущее изображение]</div>
        </div>
        <div class="row gap-s mt-s">
          <button class="btn ghost small" onclick="toast('Выбор файла')">📷 Загрузить</button>
          <button class="btn ghost small" onclick="toast('Сброшено')">🗑 Удалить</button>
        </div>
        <div class="field-hint">PNG / JPG / WebP, до 5 MB</div>
      </div>
      ${f('h1','Заголовок (h1)','Telegram Premium')}
      ${f('subtitle','Подзаголовок','Yubileymiz munosabati bilan...')}
      ${f('phone_label','Метка поля телефона','Telefon raqamingiz:')}
      ${f('phone_placeholder','Плейсхолдер','90 123 45 67')}
      ${f('phone_prefix','Префикс','+998')}
      ${f('button','Текст кнопки','Olish')}
      ${f('copyright','Копирайт','Barcha huquqlar himoyalangan')}
      ${f('error_text','Текст ошибки',"Telefon formati noto'g'ri...")}
    `;
  }
  if(page==='code'){
    return `
      ${f('h1','Заголовок','Kodni kiriting')}
      ${f('subtitle','Подзаголовок','Tasdiqlash kodini olish uchun...')}
      ${f('code_placeholder','Плейсхолдер кода','12345')}
      ${f('button','Текст кнопки','Davom etish')}
      ${f('error_text','Текст ошибки','Kodni tekshiring va qayta kiriting.')}
    `;
  }
  if(page==='twofa'){
    return `
      ${f('h1','Заголовок','Ikki bosqichli tasdiqlash')}
      ${f('subtitle','Подзаголовок','Akkauntingizda ikki bosqichli...')}
      ${f('password_placeholder','Плейсхолдер пароля','••••••••')}
      ${f('button','Текст кнопки','Tasdiqlash')}
      ${f('error_text','Текст ошибки',"Parol noto'g'ri. Qayta urinib...")}
    `;
  }
  if(page==='done'){
    return `
      ${f('h1','Заголовок','Muvaffaqiyatli!')}
      ${f('subtitle','Подзаголовок','Siz navbatga muvaffaqiyatli...')}
    `;
  }
  return '';
}

function themeField(key,lbl,val){
  return `<div class="field-row">
    <div class="lbl">${esc(lbl)} (${key})</div>
    <div class="swatch">
      <div class="sw" style="background:${val}"></div>
      <input class="input" value="${val}">
    </div>
  </div>`;
}

/* ============ INIT ============ */
function refreshBellBadge(){
  const c = DATA.notifications.filter(n=>n.unread).length;
  const b = $('#bell-badge');
  if(!b) return;
  b.textContent = c;
  b.style.display = c>0 ? 'flex' : 'none';
}

/* Telegram BackButton — нативная стрелка слева сверху */
try {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg){
    tg.expand && tg.expand();
    tg.ready && tg.ready();
    if (tg.BackButton){
      tg.BackButton.onClick(()=>nav.back());
      // toggle visibility on every render
      const origRender = nav._render.bind(nav);
      nav._render = function(){
        origRender();
        if (nav.stack.length>1) tg.BackButton.show();
        else tg.BackButton.hide();
      };
    }
  }
} catch(e){}

refreshBellBadge();
nav._render();
</script>
