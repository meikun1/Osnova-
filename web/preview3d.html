<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>3D телефон — Telegram</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#17212b;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--btn:#4aa0e0;overflow:hidden}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8px 16px}
  #stage{width:100%;max-width:360px;height:320px;touch-action:none}
  .hint{font-size:12px;opacity:.5;margin-top:-4px}
  .text{max-width:360px;background:rgba(255,255,255,0.08);border-radius:14px;padding:12px 16px;
    text-align:center;font-size:15px;line-height:1.35;margin:8px 0}
  #err{display:none;max-width:360px;color:#ff8080;font-size:13px;text-align:center;margin-top:10px}
</style>
</head>
<body>
  <div class="wrap">
    <div id="stage"></div>
    <div class="hint">крути пальцем · авто-вращение</div>
    <div class="text">Введите 5-значный код, который мы вам только что отправили!</div>
    <div id="err">Не удалось загрузить 3D-движок. Проверь интернет и открой в Safari/Chrome.</div>
  </div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
window.addEventListener('error', function(){ document.getElementById('err').style.display='block'; });
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const stage = document.getElementById('stage');
const W = stage.clientWidth, H = stage.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W, H);
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(34, W/H, 0.1, 100);
camera.position.set(0, 0, 6.2);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const key = new THREE.DirectionalLight(0xffffff, 1.6); key.position.set(3,4,5); scene.add(key);
const rim = new THREE.DirectionalLight(0x88aaff, 1.0); rim.position.set(-4,2,-3); scene.add(rim);

const phone = new THREE.Group();
scene.add(phone);

const bodyMat = new THREE.MeshStandardMaterial({ color:0x4b4456, metalness:0.7, roughness:0.33 });
const body = new THREE.Mesh(new RoundedBoxGeometry(1.0, 2.05, 0.12, 8, 0.11), bodyMat);
phone.add(body);

const screen = new THREE.Mesh(
  new THREE.PlaneGeometry(0.9, 1.95),
  new THREE.MeshStandardMaterial({ color:0x06080c, metalness:0.2, roughness:0.15, emissive:0x05070a })
);
screen.position.z = -0.061; screen.rotation.y = Math.PI;
phone.add(screen);

const camMat = new THREE.MeshStandardMaterial({ color:0x2a2730, metalness:0.6, roughness:0.4 });
const camBlock = new THREE.Mesh(new RoundedBoxGeometry(0.5, 0.5, 0.07, 5, 0.08), camMat);
camBlock.position.set(-0.24, 0.66, 0.065);
phone.add(camBlock);

const lensMat = new THREE.MeshStandardMaterial({ color:0x0c0e12, metalness:0.4, roughness:0.08 });
const ringMat = new THREE.MeshStandardMaterial({ color:0x6b6675, metalness:0.9, roughness:0.25 });
function lens(x,y){
  const g = new THREE.Group();
  const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.05,32), ringMat);
  const gl = new THREE.Mesh(new THREE.CylinderGeometry(0.075,0.075,0.06,32), lensMat);
  ring.rotation.x = Math.PI/2; gl.rotation.x = Math.PI/2;
  g.add(ring); g.add(gl);
  g.position.set(x, y, 0.105);
  phone.add(g);
}
lens(-0.36, 0.78); lens(-0.36, 0.55); lens(-0.12, 0.66);

function tgTexture(){
  const s=512, c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,s); g.addColorStop(0,'#2aabee'); g.addColorStop(1,'#229ed9');
  x.fillStyle=g; x.beginPath(); x.arc(s/2,s/2,s/2,0,Math.PI*2); x.fill();
  x.fillStyle='#fff';
  const cx=s*0.5, cy=s*0.52, R=s*0.30;
  x.beginPath();
  x.moveTo(cx-R*1.05, cy+R*0.02);
  x.lineTo(cx+R*1.15, cy-R*0.78);
  x.lineTo(cx+R*0.30, cy+R*0.95);
  x.lineTo(cx+R*0.02, cy+R*0.34);
  x.closePath(); x.fill();
  x.beginPath();
  x.moveTo(cx+R*0.02, cy+R*0.34);
  x.lineTo(cx+R*0.30, cy+R*0.95);
  x.lineTo(cx-R*0.30, cy+R*0.30);
  x.closePath();
  x.fillStyle='#cfeaff'; x.fill();
  const t=new THREE.CanvasTexture(c); t.anisotropy=8; return t;
}
const logo = new THREE.Mesh(
  new THREE.CircleGeometry(0.23, 64),
  new THREE.MeshBasicMaterial({ map:tgTexture(), transparent:true })
);
logo.position.set(0, -0.06, 0.0615);
phone.add(logo);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.enablePan = false; controls.enableZoom = false;
controls.autoRotate = true; controls.autoRotateSpeed = 3.2;
controls.minPolarAngle = Math.PI*0.30; controls.maxPolarAngle = Math.PI*0.70;

function resize(){
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w,h); camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

function loop(){
  requestAnimationFrame(loop);
  controls.update();
  renderer.render(scene, camera);
}
loop();
</script>
</body>
</html>
