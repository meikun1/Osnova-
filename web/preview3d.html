<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Экран ввода кода — превью</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#17212b;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--btn:#4aa0e0;
    overflow:hidden;
  }
  body{display:flex;justify-content:center;
    padding: env(safe-area-inset-top, 8px) 12px env(safe-area-inset-bottom, 8px);
  }
  .card{
    width:100%;max-width:370px;
    display:flex;flex-direction:column;
    height:100%;
    /* gap между блоками динамически зависит от высоты экрана */
    gap: clamp(4px, 1.2vh, 10px);
  }

  /* 3D сцена занимает ровно нужный кусок (адаптивно по высоте, не больше 36%) */
  #stage{width:100%;flex: 0 0 clamp(160px, 32vh, 260px);touch-action:none;position:relative}
  #stage canvas{display:block;margin:0 auto}
  #load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:.6}

  .text{background:rgba(255,255,255,0.08);border-radius:14px;
    padding: clamp(8px, 1.4vh, 13px) 16px;
    text-align:center;font-size:14px;line-height:1.32}
  .codecells{display:flex;gap: clamp(6px, 1.6vw, 10px);justify-content:center}
  .codecell{
    width: clamp(36px, 11vw, 46px);
    height: clamp(46px, 13vw, 56px);
    border-radius:12px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.20);display:flex;align-items:center;justify-content:center;
    font-size: clamp(22px, 6.4vw, 26px); font-weight:700}
  .codecell.filled{border-color:var(--btn)}
  .btn{border:none;border-radius:12px;
    padding: clamp(10px, 1.6vh, 14px);
    font-size:16px;font-weight:600;color:#fff;
    background:var(--btn);cursor:pointer;width:100%}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);
    gap: clamp(6px, 1.4vw, 10px);
    flex: 1 1 auto;
  }
  .key{
    border-radius:12px;text-align:center;
    font-size: clamp(20px, 5.2vw, 24px);
    font-weight:600;cursor:pointer;
    user-select:none;-webkit-user-select:none;background:var(--btn);color:#fff;
    display:flex;align-items:center;justify-content:center;
    min-height: clamp(38px, 6.4vh, 56px);
  }
  .key:active{filter:brightness(.88)}
  .key-empty{background:transparent;cursor:default}
  .step{text-align:center;font-size:12px;opacity:.5}
  #err{display:none;color:#ff8080;font-size:13px;text-align:center}
</style>
</head>
<body>
  <div class="card">
    <div id="stage"><div id="load">Загрузка 3D-модели…</div></div>

    <div class="text">Введите 5-значный код, который мы вам только что отправили!</div>

    <div class="codecells">
      <div class="codecell"></div><div class="codecell"></div><div class="codecell"></div>
      <div class="codecell"></div><div class="codecell"></div>
    </div>

    <button class="btn" id="getcode">Узнать код</button>

    <div class="keypad">
      <div class="key" data-k="1">1</div><div class="key" data-k="2">2</div><div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div><div class="key" data-k="5">5</div><div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div><div class="key" data-k="8">8</div><div class="key" data-k="9">9</div>
      <div class="key key-empty"></div><div class="key" data-k="0">0</div><div class="key" data-k="back">&#9003;</div>
    </div>

    <div class="step">2 / 3</div>
    <div id="err">Не удалось загрузить 3D. Открой в Safari/Chrome, проверь интернет.</div>
  </div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script>
  // клавиатура
  (function(){
    var LEN=5, buf="";
    var cells=document.querySelectorAll(".codecell");
    function upd(){for(var i=0;i<cells.length;i++){var c=buf[i]||"";cells[i].textContent=c;
      c?cells[i].classList.add("filled"):cells[i].classList.remove("filled");}}
    function key(k){if(k==="back")buf=buf.slice(0,-1);else if(buf.length<LEN)buf+=k;upd();
      if(buf.length===LEN){setTimeout(function(){alert("Код: "+buf+"\n(в приложении отправится автоматически)");buf="";upd();},120);}}
    var ks=document.querySelectorAll(".key[data-k]");
    for(var n=0;n<ks.length;n++){(function(el){el.onclick=function(){key(el.getAttribute("data-k"));};})(ks[n]);}
    document.getElementById("getcode").onclick=function(){alert("«Узнать код» — тут откроется твоя ссылка-ресурс");};
  })();
</script>

<script type="module">
function showErr(){var e=document.getElementById('err');if(e)e.style.display='block';
  var l=document.getElementById('load');if(l)l.style.display='none';}
window.addEventListener('error', showErr);

import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const stage = document.getElementById('stage');
let W = stage.clientWidth, H = stage.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
// Полный pixel-ratio устройства (а не cap=2) — резче на ретине.
renderer.setPixelRatio(window.devicePixelRatio || 1);
renderer.setSize(W, H);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
renderer.shadowMap.enabled = false;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, W/H, 0.1, 100);
camera.position.set(0, 0, 6.6);
camera.lookAt(0, 0, 0);

const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.02).texture;
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
scene.add(new THREE.HemisphereLight(0xffffff, 0x9090b0, 1.3));
const k = new THREE.DirectionalLight(0xffffff, 0.55); k.position.set(2,4,5); scene.add(k);

const maxAniso = renderer.capabilities.getMaxAnisotropy();

const clock = new THREE.Clock();
let phoneObj = null;

new GLTFLoader().load('/model/model.glb', (gltf) => {
  const model = gltf.scene;
  model.traverse((o) => {
    if (o.isMesh && o.material) {
      const m = o.material;
      m.aoMapIntensity = 0.25;
      m.envMapIntensity = 1.5;
      // Прокачиваем все текстуры: max anisotropy + правильное цветовое пр-во + mipmap.
      ['map','normalMap','roughnessMap','metalnessMap','emissiveMap','aoMap'].forEach((slot) => {
        const t = m[slot];
        if (!t) return;
        t.anisotropy = maxAniso;
        t.generateMipmaps = true;
        t.minFilter = THREE.LinearMipmapLinearFilter;
        t.magFilter = THREE.LinearFilter;
        if (slot === 'map' || slot === 'emissiveMap') t.colorSpace = THREE.SRGBColorSpace;
        t.needsUpdate = true;
      });
      m.needsUpdate = true;
    }
  });
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const ctr = box.getCenter(new THREE.Vector3());
  model.position.sub(ctr);
  const pivot = new THREE.Group(); pivot.add(model);

  const md = Math.max(size.x, size.y, size.z) || 1;
  pivot.scale.setScalar(2.6 / md);
  const tilt = new THREE.Group();
  tilt.rotation.x = -0.22;
  tilt.add(pivot);
  scene.add(tilt);
  phoneObj = pivot;
  const l = document.getElementById('load'); if (l) l.style.display = 'none';
}, undefined, showErr);

function resize(){
  W = stage.clientWidth; H = stage.clientHeight;
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  renderer.setSize(W,H);
  camera.aspect = W/H; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

(function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (phoneObj) phoneObj.rotation.y += dt * 0.6;
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
