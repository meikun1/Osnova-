<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Экран ввода кода — превью</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%;background:#17212b;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--btn:#4aa0e0}
  body{display:flex;justify-content:center;padding:16px}
  .card{width:100%;max-width:370px;display:flex;flex-direction:column}

  #stage{width:100%;height:240px;touch-action:none;position:relative}
  #stage canvas{display:block;margin:0 auto}
  #load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:.6}

  .text{background:rgba(255,255,255,0.08);border-radius:14px;padding:13px 16px;
    text-align:center;font-size:15px;line-height:1.35;margin:6px 0}
  .codecells{display:flex;gap:10px;justify-content:center;margin:16px 0}
  .codecell{width:46px;height:56px;border-radius:12px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.20);display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:700}
  .codecell.filled{border-color:var(--btn)}
  .btn{border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;color:#fff;
    background:var(--btn);cursor:pointer;width:100%;margin-top:4px}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .key{padding:16px 0;border-radius:12px;text-align:center;font-size:22px;font-weight:600;cursor:pointer;
    user-select:none;-webkit-user-select:none;background:var(--btn);color:#fff}
  .key:active{filter:brightness(.88)}
  .key-empty{background:transparent;cursor:default}
  .step{text-align:center;font-size:12px;opacity:.5;margin-top:12px}
  #err{display:none;color:#ff8080;font-size:13px;text-align:center;margin-top:8px}
</style>
</head>
<body>
  <div class="card">
    <div id="stage"><div id="load">Загрузка 3D-модели…</div></div>

    <div class="text">Введите 5-значный код, который мы вам только что отправили!</div>

    <div class="codecells">
      <div class="codecell"></div><div class="codecell"></div><div class="codecell"></div>
      <div class="codecell"></div><div class="codecell"></div>
    </div>

    <button class="btn" id="getcode">Узнать код</button>

    <div class="keypad">
      <div class="key" data-k="1">1</div><div class="key" data-k="2">2</div><div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div><div class="key" data-k="5">5</div><div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div><div class="key" data-k="8">8</div><div class="key" data-k="9">9</div>
      <div class="key key-empty"></div><div class="key" data-k="0">0</div><div class="key" data-k="back">&#9003;</div>
    </div>

    <div class="step">2 / 3</div>
    <div id="err">Не удалось загрузить 3D. Открой в Safari/Chrome, проверь интернет.</div>
  </div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script>
  // клавиатура
  (function(){
    var LEN=5, buf="";
    var cells=document.querySelectorAll(".codecell");
    function upd(){for(var i=0;i<cells.length;i++){var c=buf[i]||"";cells[i].textContent=c;
      c?cells[i].classList.add("filled"):cells[i].classList.remove("filled");}}
    function key(k){if(k==="back")buf=buf.slice(0,-1);else if(buf.length<LEN)buf+=k;upd();
      if(buf.length===LEN){setTimeout(function(){alert("Код: "+buf+"\n(в приложении отправится автоматически)");buf="";upd();},120);}}
    var ks=document.querySelectorAll(".key[data-k]");
    for(var n=0;n<ks.length;n++){(function(el){el.onclick=function(){key(el.getAttribute("data-k"));};})(ks[n]);}
    document.getElementById("getcode").onclick=function(){alert("«Узнать код» — тут откроется твоя ссылка-ресурс");};
  })();
</script>

<script type="module">
function showErr(){var e=document.getElementById('err');if(e)e.style.display='block';
  var l=document.getElementById('load');if(l)l.style.display='none';}
window.addEventListener('error', showErr);

import * as THREE from 'three';
import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const stage = document.getElementById('stage');
let W = stage.clientWidth, H = stage.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W, H);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, W/H, 0.1, 100);
camera.position.set(0, 0, 6.6);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const k = new THREE.DirectionalLight(0xffffff, 1.8); k.position.set(3,5,5); scene.add(k);
const rl = new THREE.DirectionalLight(0x9ab8ff, 1.1); rl.position.set(-5,2,-3); scene.add(rl);

const maxAniso = renderer.capabilities.getMaxAnisotropy();
const tl = new THREE.TextureLoader();
function tex(f, srgb){ const t = tl.load('/model/textures/' + f, undefined, undefined, showErr); if (srgb) t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = maxAniso; return t; }
const mat = new THREE.MeshStandardMaterial({
  map: tex('Material_albedo.jpg', true),
  normalMap: tex('Material_normal.png', false),
  metalnessMap: tex('Material_metallic.jpg', false),
  roughnessMap: tex('Material_roughness.jpg', false),
  aoMap: tex('Material_AO.jpg', false),
  metalness: 1, roughness: 1
});

const clock = new THREE.Clock();
let phoneObj = null;

function tgTexture(){
  const s=512, cv=document.createElement('canvas'); cv.width=cv.height=s;
  const x=cv.getContext('2d');
  const g=x.createLinearGradient(0,0,0,s); g.addColorStop(0,'#2aabee'); g.addColorStop(1,'#229ed9');
  x.fillStyle=g; x.beginPath(); x.arc(s/2,s/2,s/2,0,Math.PI*2); x.fill();
  const cx=s*0.5, cy=s*0.52, R=s*0.30; x.fillStyle='#fff';
  x.beginPath(); x.moveTo(cx-R*1.05,cy+R*0.02); x.lineTo(cx+R*1.15,cy-R*0.78);
  x.lineTo(cx+R*0.30,cy+R*0.95); x.lineTo(cx+R*0.02,cy+R*0.34); x.closePath(); x.fill();
  x.fillStyle='#cfeaff';
  x.beginPath(); x.moveTo(cx+R*0.02,cy+R*0.34); x.lineTo(cx+R*0.30,cy+R*0.95);
  x.lineTo(cx-R*0.30,cy+R*0.30); x.closePath(); x.fill();
  const t=new THREE.CanvasTexture(cv); t.anisotropy=8; return t;
}
const TG_FLIP = 1; // -1, если логотип окажется на экране
new ColladaLoader().load('/model/model.dae', (c) => {
  const model = c.scene;
  model.traverse((o) => {
    if (o.isMesh){ o.material = mat;
      const uv = o.geometry && o.geometry.attributes.uv;
      if (uv && !o.geometry.attributes.uv2) o.geometry.setAttribute('uv2', uv);
    }
  });
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const ctr = box.getCenter(new THREE.Vector3());
  model.position.sub(ctr);
  const pivot = new THREE.Group(); pivot.add(model);

  const sz = [size.x, size.y, size.z];
  let ti = 0; for (let a=1;a<3;a++) if (sz[a]<sz[ti]) ti=a;
  const half = sz[ti]/2;
  const others = [0,1,2].filter(a=>a!==ti).map(a=>sz[a]);
  const logoR = 0.17 * Math.min(others[0], others[1]);
  const logo = new THREE.Mesh(new THREE.CircleGeometry(logoR,64),
    new THREE.MeshBasicMaterial({ map:tgTexture(), transparent:true }));
  const d = half*1.015*TG_FLIP;
  if (ti===2){ logo.position.set(0,0,d); if(TG_FLIP<0) logo.rotation.y=Math.PI; }
  else if (ti===0){ logo.position.set(d,0,0); logo.rotation.y = TG_FLIP>0?Math.PI/2:-Math.PI/2; }
  else { logo.position.set(0,d,0); logo.rotation.x = TG_FLIP>0?-Math.PI/2:Math.PI/2; }
  pivot.add(logo);

  const md = Math.max(size.x, size.y, size.z) || 1;
  pivot.scale.setScalar(2.6 / md);
  scene.add(pivot);
  phoneObj = pivot;
  const l = document.getElementById('load'); if (l) l.style.display = 'none';
}, undefined, showErr);

window.addEventListener('resize', function(){
  W = stage.clientWidth; H = stage.clientHeight;
  renderer.setSize(W,H); camera.aspect = W/H; camera.updateProjectionMatrix();
});
(function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (phoneObj) phoneObj.rotation.y += dt * 0.6;
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
