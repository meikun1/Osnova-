<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>iPhone 14 Pro 3D — Telegram</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#17212b;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--btn:#4aa0e0;overflow:hidden}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8px 16px}
  #stage{width:100%;max-width:380px;height:360px;touch-action:none}
  .hint{font-size:12px;opacity:.5;margin-top:-4px}
  .text{max-width:360px;background:rgba(255,255,255,0.08);border-radius:14px;padding:12px 16px;
    text-align:center;font-size:15px;line-height:1.35;margin:8px 0}
  #err{display:none;max-width:360px;color:#ff8080;font-size:13px;text-align:center;margin-top:10px}
</style>
</head>
<body>
  <div class="wrap">
    <div id="stage"></div>
    <div class="hint">крути пальцем · авто-вращение</div>
    <div class="text">Введите 5-значный код, который мы вам только что отправили!</div>
    <div id="err">Не удалось загрузить 3D-движок. Проверь интернет и открой в Safari/Chrome.</div>
  </div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
window.addEventListener('error', function(){ document.getElementById('err').style.display='block'; });
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const stage = document.getElementById('stage');
let W = stage.clientWidth, H = stage.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W, H);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, W/H, 0.1, 100);
camera.position.set(0, 0, 6.6);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

scene.add(new THREE.AmbientLight(0xffffff, 0.30));
const key = new THREE.DirectionalLight(0xffffff, 1.7); key.position.set(3,5,5); scene.add(key);
const rim = new THREE.DirectionalLight(0x9ab8ff, 1.1); rim.position.set(-5,2,-3); scene.add(rim);

const phone = new THREE.Group();
scene.add(phone);

// размеры iPhone 14 Pro (пропорции 2.06:1, тонкий)
const Wd=1.0, Ht=2.06, D=0.105;

// рамка — нержавейка «глубокий фиолетовый», глянцевая
const frameMat = new THREE.MeshStandardMaterial({ color:0x564f63, metalness:0.95, roughness:0.16 });
const frame = new THREE.Mesh(new RoundedBoxGeometry(Wd, Ht, D, 10, 0.13), frameMat);
phone.add(frame);

// задняя матовая стеклянная панель (глубокий фиолетовый)
const backMat = new THREE.MeshStandardMaterial({ color:0x453f55, metalness:0.35, roughness:0.55 });
const back = new THREE.Mesh(new RoundedBoxGeometry(Wd-0.06, Ht-0.06, 0.05, 8, 0.11), backMat);
back.position.z = D/2 - 0.018;
phone.add(back);

// передний экран (чёрное стекло)
const scrMat = new THREE.MeshStandardMaterial({ color:0x06070b, metalness:0.25, roughness:0.08, emissive:0x04050a });
const scr = new THREE.Mesh(new RoundedBoxGeometry(Wd-0.06, Ht-0.06, 0.05, 8, 0.11), scrMat);
scr.position.z = -(D/2 - 0.018);
phone.add(scr);

// Dynamic Island
const di = new THREE.Mesh(
  new RoundedBoxGeometry(0.26, 0.075, 0.02, 4, 0.037),
  new THREE.MeshStandardMaterial({ color:0x000000, roughness:0.4, metalness:0 })
);
di.position.set(0, 0.80, -(D/2)+0.005);
phone.add(di);

// блок камеры (большой, верх-лево, выступает)
const camMat = new THREE.MeshStandardMaterial({ color:0x3b3548, metalness:0.55, roughness:0.4 });
const camBlock = new THREE.Mesh(new RoundedBoxGeometry(0.6, 0.6, 0.1, 6, 0.14), camMat);
const CB_Z = D/2 + 0.03;
camBlock.position.set(-0.16, 0.6, CB_Z);
phone.add(camBlock);

const ringMat = new THREE.MeshStandardMaterial({ color:0x726c7e, metalness:1.0, roughness:0.22 });
const glassMat = new THREE.MeshStandardMaterial({ color:0x0a0c14, metalness:0.5, roughness:0.05 });
function bigLens(x,y){
  const g = new THREE.Group();
  const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.135,0.135,0.07,40), ringMat);
  const gl   = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.08,40), glassMat);
  ring.rotation.x = Math.PI/2; gl.rotation.x = Math.PI/2;
  g.add(ring, gl); g.position.set(x, y, CB_Z+0.06); phone.add(g);
}
// три крупные линзы треугольником
bigLens(-0.32, 0.74); bigLens(-0.32, 0.46); bigLens(-0.02, 0.60);
// вспышка и LiDAR (мелкие)
function dot(x,y,c,r){
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r,r,0.05,24),
    new THREE.MeshStandardMaterial({ color:c, metalness:0.4, roughness:0.3 }));
  m.rotation.x=Math.PI/2; m.position.set(x,y,CB_Z+0.05); phone.add(m);
}
dot(-0.02, 0.82, 0x2a2d35, 0.05);   // LiDAR
dot(0.12, 0.74, 0xfff3d0, 0.055);   // вспышка
dot(0.12, 0.60, 0x2a2d35, 0.045);   // микрофон

// логотип Telegram на задней крышке (вместо яблока)
function tgTexture(){
  const s=512, c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,s); g.addColorStop(0,'#2aabee'); g.addColorStop(1,'#229ed9');
  x.fillStyle=g; x.beginPath(); x.arc(s/2,s/2,s/2,0,Math.PI*2); x.fill();
  const cx=s*0.5, cy=s*0.52, R=s*0.30;
  x.fillStyle='#fff';
  x.beginPath();
  x.moveTo(cx-R*1.05, cy+R*0.02); x.lineTo(cx+R*1.15, cy-R*0.78);
  x.lineTo(cx+R*0.30, cy+R*0.95); x.lineTo(cx+R*0.02, cy+R*0.34);
  x.closePath(); x.fill();
  x.fillStyle='#cfeaff';
  x.beginPath();
  x.moveTo(cx+R*0.02, cy+R*0.34); x.lineTo(cx+R*0.30, cy+R*0.95);
  x.lineTo(cx-R*0.30, cy+R*0.30); x.closePath(); x.fill();
  const t=new THREE.CanvasTexture(c); t.anisotropy=8; return t;
}
const logo = new THREE.Mesh(
  new THREE.CircleGeometry(0.2, 64),
  new THREE.MeshBasicMaterial({ map:tgTexture(), transparent:true })
);
logo.position.set(0.05, -0.15, back.position.z + 0.026);
phone.add(logo);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.enablePan = false; controls.enableZoom = false;
controls.autoRotate = true; controls.autoRotateSpeed = 3.0;
controls.minPolarAngle = Math.PI*0.32; controls.maxPolarAngle = Math.PI*0.68;

window.addEventListener('resize', function(){
  W = stage.clientWidth; H = stage.clientHeight;
  renderer.setSize(W,H); camera.aspect = W/H; camera.updateProjectionMatrix();
});

(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
</script>
</body>
</html>
