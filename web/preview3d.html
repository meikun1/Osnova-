<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>iPhone 14 Pro 3D</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#17212b;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8px 16px}
  #stage{width:100%;max-width:380px;height:420px;touch-action:none;position:relative}
  #load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.7}
  .hint{font-size:12px;opacity:.5;margin-top:-4px}
  .text{max-width:360px;background:rgba(255,255,255,0.08);border-radius:14px;padding:12px 16px;
    text-align:center;font-size:15px;line-height:1.35;margin:8px 0}
  #err{display:none;max-width:360px;color:#ff8080;font-size:13px;text-align:center;margin-top:10px}
</style>
</head>
<body>
  <div class="wrap">
    <div id="stage"><div id="load">Загрузка 3D-модели…</div></div>
    <div class="hint">крути пальцем · авто-вращение</div>
    <div class="text">Введите 5-значный код, который мы вам только что отправили!</div>
    <div id="err">Не удалось загрузить 3D. Открой в Safari/Chrome, проверь интернет.</div>
  </div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
function showErr(){ document.getElementById('err').style.display='block';
  var l=document.getElementById('load'); if(l) l.style.display='none'; }
window.addEventListener('error', showErr);

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const stage = document.getElementById('stage');
let W = stage.clientWidth, H = stage.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W, H);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, W/H, 0.1, 100);
camera.position.set(0, 0, 6.4);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const key = new THREE.DirectionalLight(0xffffff, 1.8); key.position.set(3,5,5); scene.add(key);
const rim = new THREE.DirectionalLight(0x9ab8ff, 1.1); rim.position.set(-5,2,-3); scene.add(rim);

const texLoader = new THREE.TextureLoader();
function tex(file, srgb){
  const t = texLoader.load('/model/textures/' + file, undefined, undefined, showErr);
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  return t;
}
const mat = new THREE.MeshStandardMaterial({
  map:          tex('Material_albedo.jpg', true),
  normalMap:    tex('Material_normal.png', false),
  metalnessMap: tex('Material_metallic.jpg', false),
  roughnessMap: tex('Material_roughness.jpg', false),
  aoMap:        tex('Material_AO.jpg', false),
  metalness: 1.0, roughness: 1.0,
});

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.enablePan = false; controls.enableZoom = false;
controls.autoRotate = true; controls.autoRotateSpeed = 2.6;
controls.minPolarAngle = Math.PI*0.30; controls.maxPolarAngle = Math.PI*0.70;

const loader = new ColladaLoader();
loader.load('/model/model.dae', function(collada){
  const model = collada.scene;
  model.traverse(function(o){
    if (o.isMesh){
      o.material = mat;
      const uv = o.geometry && o.geometry.attributes.uv;
      if (uv && !o.geometry.attributes.uv2) o.geometry.setAttribute('uv2', uv);
    }
  });
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  model.scale.setScalar(3.4 / maxDim);
  scene.add(model);
  const l = document.getElementById('load'); if (l) l.style.display = 'none';
}, undefined, showErr);

window.addEventListener('resize', function(){
  W = stage.clientWidth; H = stage.clientHeight;
  renderer.setSize(W,H); camera.aspect = W/H; camera.updateProjectionMatrix();
});

(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
</script>
</body>
</html>
