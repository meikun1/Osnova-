<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Панель управления</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
<script src="/static/template-render.js?__TR_V__"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#17212b; --card:#1c2734; --card-border:#232e3c;
    --input-bg:#0e161e; --input-border:#1e2832; --hairline:#1a2330;
    --text:#fff; --text-soft:#cdd6e0; --muted:#8b9aab; --label:#708499; --hint:#5b6877;
    --accent:#2ea6ff; --accent-soft:#1f3b5a;
    --ok:#4dcd5e; --ok-bg:#1f3b2c;
    --warn:#f0a23b; --warn-bg:#2f2a1f;
    --err:#e8503a; --err-bg:#4a2027;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    height:100%;overflow:hidden;-webkit-text-size-adjust:100%;}
  body{display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);}
  .mono{font-family:'JetBrains Mono',monospace;font-size:.9em}
  .uppercase{text-transform:uppercase;letter-spacing:.05em;font-size:11px;font-weight:700;color:var(--label)}
  .hidden{display:none!important}

  /* топбар */
  .topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;
    border-bottom:1px solid var(--hairline);min-height:44px;}
  .topbar .title{flex:1;font-size:18px;font-weight:700}
  .topbar .sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  /* Своя back-стрелка скрыта всегда — используем нативный Telegram BackButton */
  .topbar .back{display:none!important}

  /* контент */
  main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
    padding:14px 14px 80px;}

  /* нижняя навигация */
  nav.tabs{display:flex;border-top:1px solid var(--hairline);background:var(--bg);
    padding:8px 8px 6px;}
  nav.tabs .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--muted);cursor:pointer;padding:6px 4px;font-size:11px;font-weight:600;}
  nav.tabs .tab.active{color:var(--accent)}
  nav.tabs .tab .ico{font-size:20px;line-height:1}
  .ico-svg{width:22px;height:22px;display:block;color:currentColor;}

  /* карточки */
  .card{background:var(--card);border:1px solid var(--card-border);
    border-radius:14px;padding:14px;margin-bottom:10px}
  .card.tight{padding:12px}
  .row{display:flex;align-items:center;gap:10px}
  .row.between{justify-content:space-between}
  .gap-s{gap:6px} .gap-m{gap:10px} .gap-l{gap:14px}
  .v{display:flex;flex-direction:column;gap:6px}

  .section-label{padding:14px 4px 6px;color:var(--label);font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.05em}

  /* бот в списке */
  .bot-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);
    border:1px solid var(--card-border);border-radius:14px;margin-bottom:8px;cursor:pointer;
    min-height:60px;transition:.1s background;}
  .bot-item:active{background:#202d3c}
  .avatar{width:40px;height:40px;border-radius:12px;background:var(--accent-soft);
    color:var(--accent);display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;flex-shrink:0}
  .bot-name{font-size:14.5px;font-weight:600;line-height:1.2}
  .bot-meta{font-size:12px;color:var(--muted);line-height:1.2;margin-top:3px}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:9px;
    font-size:10.5px;font-weight:600;line-height:1.5;}
  .pill.ok{background:var(--ok-bg);color:var(--ok)}
  .pill.warn{background:var(--warn-bg);color:var(--warn)}
  .pill.err{background:var(--err-bg);color:var(--err)}
  .pill.muted{background:var(--input-bg);color:var(--muted)}
  .pill.dot::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}

  /* метрики (воронка) */
  .funnel{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .metric{background:var(--input-bg);border:1px solid var(--input-border);
    border-radius:12px;padding:11px 12px;}
  .metric .label{font-size:11px;color:var(--label);text-transform:uppercase;
    letter-spacing:.04em;font-weight:700;}
  .metric .value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;
    margin-top:4px;color:var(--text);}

  /* кнопки */
  .btn{display:flex;align-items:center;justify-content:center;width:100%;border:none;
    border-radius:12px;padding:14px 18px;font-size:15px;font-weight:700;cursor:pointer;
    background:var(--accent);color:#fff;-webkit-appearance:none;font-family:inherit;}
  .btn:active{filter:brightness(.92)}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent-soft);}
  .btn.danger{background:var(--err)}
  .btn.muted{background:var(--input-bg);color:var(--text-soft);border:1px solid var(--input-border);}
  .btn.small{padding:9px 12px;font-size:13px;font-weight:600}
  /* Маленькая круглая кнопка для action-иконок в списках */
  .iconbtn{display:inline-flex;align-items:center;justify-content:center;
    width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;
    background:var(--err-bg);color:var(--err);font-size:18px;font-weight:700;
    flex-shrink:0;padding:0;line-height:1;-webkit-appearance:none;font-family:inherit;}
  .iconbtn:active{filter:brightness(.85)}

  /* инпуты */
  .input,.textarea{width:100%;background:var(--input-bg);border:1px solid var(--input-border);
    border-radius:12px;padding:12px 14px;color:var(--text);font-size:14.5px;
    font-family:inherit;outline:none;-webkit-appearance:none;}
  .input:focus,.textarea:focus{border-color:var(--accent)}
  .textarea{resize:vertical;min-height:90px;font-family:inherit}
  .field-hint{font-size:11.5px;color:var(--hint);margin-top:5px;line-height:1.4}

  /* свитч */
  .switch{position:relative;width:42px;height:25px;background:#384655;border-radius:13px;
    transition:.18s;flex-shrink:0;cursor:pointer}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;
    background:#fff;border-radius:50%;transition:.18s;}
  .switch.on{background:var(--accent)}
  .switch.on::after{left:19px}

  /* шторка */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none;
    animation:bgIn .15s ease-out}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-radius:24px 24px 0 0;
    z-index:51;display:none;animation:sheetUp .22s cubic-bezier(.18,.89,.32,1.28);
    padding:18px 16px calc(28px + env(safe-area-inset-bottom));max-height:90%;overflow-y:auto;}
  .sheet.show, .sheet-bg.show{display:block}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:#384655;margin:0 auto 12px}
  .sheet-title{font-size:17px;font-weight:700;margin-bottom:14px}
  @keyframes bgIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}

  /* код / моно блоки */
  .codeblock{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--input-bg);
    border:1px solid var(--input-border);padding:10px 12px;border-radius:10px;color:var(--text-soft);
    word-break:break-all;cursor:pointer;}
  .codeblock:active{background:#0a1219}

  /* KPI-полоса дашборда */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .kpi{background:var(--card);border:1px solid var(--card-border);border-radius:14px;
    padding:11px 10px;text-align:center}
  .kpi .v{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;
    color:var(--text);letter-spacing:.01em}
  .kpi .v.ok{color:var(--ok)}
  .kpi .k{font-size:11px;color:var(--muted);margin-top:3px;text-transform:lowercase}

  /* чипы папок */
  .chips{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:4px;margin-bottom:8px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;
    background:var(--card);border:1px solid var(--card-border);color:var(--text-soft);
    font-size:13px;font-weight:600;flex-shrink:0;cursor:pointer;white-space:nowrap}
  .chip.active{background:var(--accent);color:#fff;border-color:transparent}
  .chip .n{opacity:.7;font-weight:700}
  .chip.active .n{opacity:.85}

  /* строка бота в дашборде */
  .botrow{display:flex;align-items:center;gap:12px;padding:11px 12px;background:var(--card);
    border:1px solid var(--card-border);border-radius:14px;margin-bottom:8px;cursor:pointer;
    min-height:62px}
  .botrow:active{background:#202d3c}
  .botrow .av{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .botrow .meta{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
  .botrow .name{display:flex;align-items:center;gap:6px;font-size:14.5px;font-weight:700;color:var(--text)}
  .botrow .name .sd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .botrow .name .sd.green{background:var(--ok)}
  .botrow .name .sd.amber{background:var(--warn)}
  .botrow .name .sd.red{background:var(--err)}
  .botrow .un{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .botrow .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .ma-pill{font-size:10.5px;font-weight:700;padding:2.5px 8px;border-radius:9px;letter-spacing:.02em}
  .ma-pill.on{background:var(--accent-soft);color:var(--accent)}
  .ma-pill.off{color:var(--muted)}
  .ma-pill.off::before{content:""}
  .botrow .cnt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text-soft)}

  /* ===== Builder (Template Builder) ===== */
  .builder-steps{display:flex;gap:6px;overflow-x:auto;padding:6px 0 10px;
    scrollbar-width:none;-ms-overflow-style:none;}
  .builder-steps::-webkit-scrollbar{display:none}
  /* Старые правила для builder-step ниже перебивают эти. */
  .builder-step.addbtn{align-items:center;justify-content:center;color:var(--accent);font-size:18px;min-width:36px;padding:8px 10px;}

  /* Live preview обёртка */
  .preview-frame{background:#1a1f2e;border:1px solid var(--card-border);
    border-radius:14px;padding:8px;position:relative;margin-bottom:10px;
    min-height:240px;}
  .preview-chip{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;color:var(--accent);
    background:#0e161e;border:1px solid #1e2832;padding:3px 8px;border-radius:8px;
    z-index:2;}

  /* Editor tabs (Тексты/Кнопки/Картинка/Цвета/Шаги) */
  .editor-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;
    border-bottom:1px solid var(--hairline);margin-bottom:12px;
    scrollbar-width:none;}
  .editor-tabs::-webkit-scrollbar{display:none}
  .editor-tab{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;
    color:var(--muted);cursor:pointer;flex-shrink:0;
    border:1px solid transparent;transition:.15s background,.15s color,.15s border-color;}
  .editor-tab:active{transform:scale(.97)}
  .editor-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);
    box-shadow:0 2px 10px rgba(46,166,255,.35);}

  /* Step tabs: подсветка ярче */
  .builder-step{display:inline-flex;flex-direction:column;align-items:flex-start;
    flex-shrink:0;padding:9px 13px;border-radius:11px;cursor:pointer;
    background:var(--card);border:2px solid var(--card-border);min-width:88px;
    transition:.15s border-color,.15s background;}
  .builder-step.active{background:var(--accent-soft);border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent) inset;}
  .builder-step .num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);font-weight:700;}
  .builder-step.active .num{color:var(--accent)}
  .builder-step .lbl{font-size:13px;font-weight:700;color:var(--text);margin-top:2px;}

  /* поля редактора */
  .field-row{margin-bottom:14px}
  .field-row .lbl{font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;color:var(--label);margin-bottom:6px;}

  /* палитра цветов */
  .palette{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-top:6px;}
  .palette-cell{aspect-ratio:1;border-radius:10px;cursor:pointer;border:2px solid transparent;}
  .palette-cell.active{border-color:var(--accent)}

  /* стикеры grid */
  .sticker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .sticker-tile{aspect-ratio:1;border-radius:12px;background:var(--input-bg);
    border:1px solid var(--input-border);cursor:pointer;display:flex;
    align-items:center;justify-content:center;font-size:32px;}
  .sticker-tile.active{border-color:var(--accent);background:var(--accent-soft)}

  /* иконки grid (6 в строку) */
  .icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .icon-tile{aspect-ratio:1;border-radius:14px;background:var(--input-bg);
    border:2px solid var(--input-border);cursor:pointer;display:flex;
    align-items:center;justify-content:center;font-size:26px;color:var(--muted);}
  .icon-tile.active{border-color:var(--accent);background:var(--accent-soft)}

  /* лог-лента */
  .log-row{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;
    background:var(--card);border:1px solid var(--card-border);border-radius:12px;
    margin-bottom:6px;}
  .log-marker{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;}
  .log-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;}
  .log-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .log-label{font-size:13.5px;font-weight:700;color:var(--text);}
  .log-time{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;
    white-space:nowrap;}
  .log-meta{display:flex;flex-wrap:wrap;gap:6px;}
  .logchip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
    border-radius:8px;font-size:11.5px;font-weight:600;
    background:var(--input-bg);color:var(--text-soft);cursor:pointer;
    font-family:'JetBrains Mono',monospace;border:1px solid var(--input-border);}
  .logchip.bot{color:var(--accent);}
  .logchip.user{color:#c79bff;}
  .logchip:active{filter:brightness(.85)}

  /* save-status */
  .save-status{position:absolute;top:14px;left:14px;font-size:10.5px;font-weight:600;
    color:var(--muted);z-index:2;background:#0e161e;border:1px solid #1e2832;
    padding:3px 8px;border-radius:8px;display:none;}
  .save-status.shown{display:inline-block}
  .save-status.saving{color:var(--warn)}
  .save-status.saved{color:var(--ok)}

  /* шапка бота — компактная */
  .bothead{display:flex;align-items:center;gap:10px;padding:10px 11px;background:var(--card);
    border:1px solid var(--card-border);border-radius:14px;margin-bottom:6px;}
  .bothead .avatar{width:40px;height:40px;border-radius:12px;font-size:15px;flex-shrink:0;}
  .bothead .name{font-size:15.5px;font-weight:800;line-height:1.15;color:var(--text);}
  .bothead .uname{font-size:11.5px;color:var(--muted);margin-top:1px;font-family:'JetBrains Mono',monospace;line-height:1.2;}
  .bothead .online{display:inline-flex;align-items:center;gap:6px;background:var(--ok-bg);
    color:var(--ok);font-size:11px;font-weight:600;padding:3px 9px;border-radius:11px;flex-shrink:0;}
  .bothead .online::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;
    animation:pulseG 1.8s ease-out infinite;}
  @keyframes pulseG{
    0%   {box-shadow:0 0 0 0 rgba(77,205,94,.55);}
    70%  {box-shadow:0 0 0 6px rgba(77,205,94,0);}
    100% {box-shadow:0 0 0 0 rgba(77,205,94,0);}
  }

  /* строки инфо: компактные, лейбл слева, значение справа, точка inline */
  .infogrid{display:grid;grid-template-columns:auto 1fr;gap:7px 8px;
    padding:9px 6px 9px 14px;background:var(--card);border:1px solid var(--card-border);
    border-radius:14px;font-size:13px;margin-bottom:10px;}
  .infogrid > *{min-width:0;}
  .infogrid .k{color:var(--label);font-weight:500;line-height:1.3;white-space:nowrap;}
  .infogrid .v{font-weight:700;color:var(--text);line-height:1.3;
    display:flex;justify-content:flex-end;align-items:center;
    white-space:nowrap;overflow:hidden;min-width:0;text-align:right;}
  .infogrid .v.link{color:var(--accent);}
  .infogrid .v.mono{font-family:'JetBrains Mono',monospace;font-size:12.5px;}
  /* Контейнер «текст+точка», чтобы они гарантированно были на одной строке */
  .vwrap{display:inline-flex;align-items:center;gap:6px;max-width:100%;}
  .vwrap > .txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  .vwrap > .dot-ok,.vwrap > .dot-warn{display:inline-block;width:7px;height:7px;
    border-radius:50%;flex-shrink:0;}
  .vwrap > .dot-ok{background:var(--ok);animation:pulseG 1.8s ease-out infinite;}
  .vwrap > .dot-warn{background:var(--warn);}

  /* воронка — одна общая карточка с внутренними разделителями */
  .funnel-card{background:var(--card);border:1px solid var(--card-border);
    border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .fline{display:flex;align-items:center;gap:12px;padding:13px 14px 13px 18px;
    position:relative;}
  .fline + .fline{border-top:1px solid var(--hairline);}
  .fline::before{content:"";position:absolute;left:10px;top:14px;bottom:14px;width:3px;
    border-radius:2px;background:var(--accent);}
  .fline.green::before{background:var(--ok);}
  .fline .lbl{flex:1;color:var(--text-soft);font-size:14px;font-weight:500;}
  .fline .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;
    color:var(--text);letter-spacing:.02em;}
  .fline.green .val{color:var(--ok);}

  /* toggle-row */
  .togrow{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);
    border:1px solid var(--card-border);border-radius:14px;margin-bottom:8px;}
  .togrow .ico{font-size:18px;width:24px;text-align:center}
  .togrow .v{flex:1;display:flex;flex-direction:column;gap:1px}
  .togrow .ttl{font-size:14.5px;font-weight:600;color:var(--text)}
  .togrow .sub{font-size:11.5px;color:var(--muted)}

  /* 3x2 квадратные действия */
  .actgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;margin-bottom:10px;}
  .actbtn{background:var(--card);border:1px solid var(--card-border);border-radius:14px;
    padding:13px 14px;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:700;
    color:var(--text);cursor:pointer;text-align:left;}
  .actbtn:active{background:#202d3c}
  .actbtn .actico{width:20px;height:20px;flex-shrink:0;display:block}
  .actbtn .actico use{display:block}
  /* цвета per-кнопка */
  .actbtn.c-blue   .actico{color:#2ea6ff}
  .actbtn.c-orange .actico{color:#f0a23b}
  .actbtn.c-red    .actico{color:#e8503a}
  .actbtn.c-gray   .actico{color:#8b9aab}
  .actbtn.c-green  .actico{color:#4dcd5e}

  /* пустые состояния */
  .empty{text-align:center;padding:36px 18px;color:var(--muted)}
  .empty .ico{font-size:38px;margin-bottom:10px}
  .empty .ttl{font-size:15px;font-weight:600;color:var(--text-soft);margin-bottom:4px}
  .empty .sub{font-size:12.5px;line-height:1.5}

  /* тосты */
  #toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#0b1117;
    color:#fff;padding:12px 16px;border-radius:10px;font-size:13.5px;border:1px solid #2a3947;
    z-index:200;display:none;max-width:80%;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.4)}
  #toast.show{display:block}
</style>
</head>
<body>
  <div class="topbar">
    <span class="back" id="backbtn">‹</span>
    <div class="v" style="gap:1px">

  <main id="content"></main>

  <!-- SVG спрайт из прототипа (stroke=1.9, viewBox 0 0 24 24, currentColor) -->

      <symbol id="ic-folders" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" fill="none" stroke="currentColor" stroke-width="1.9"/></symbol>
      <symbol id="ic-profile" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></symbol>

      <symbol id="ic-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.9"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h.1a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></symbol>
      <symbol id="ic-restart" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 4v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="ic-case" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.9"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></symbol>

  </svg>

  <nav class="tabs">
    <div class="tab active" data-tab="bots"><svg class="ico-svg"><use href="#ic-bots"/></svg>Боты</div>
    <div class="tab" data-tab="drafts"><svg class="ico-svg"><use href="#ic-drafts"/></svg>Создания</div>

    <div class="tab" data-tab="profile"><svg class="ico-svg"><use href="#ic-profile"/></svg>Профиль</div>

  <div class="sheet-bg" id="sheet-bg"></div>

    <div class="sheet-handle"></div>
    <div id="sheet-body"></div>
  </div>

  <div id="toast"></div>

<script>
/* ---------- Telegram WebApp init ---------- */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) {
  try { tg.ready(); } catch(e){}
  try { tg.expand(); } catch(e){}
  try { tg.setHeaderColor('#17212b'); } catch(e){}
  try { tg.setBackgroundColor('#17212b'); } catch(e){}
}
const INIT_DATA = tg ? tg.initData : "";
const USER = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null;

/* MainButton helper. Передаём callback и текст, отписку делаем при смене экрана. */
let _mainCB = null;
function setMain(text, cb){
  if (!tg || !tg.MainButton){ return; }
  try {
    if (_mainCB){ tg.MainButton.offClick(_mainCB); _mainCB = null; }
    if (!text || !cb){ tg.MainButton.hide(); return; }
    tg.MainButton.setText(text);
    _mainCB = cb;
    tg.MainButton.onClick(cb);
    tg.MainButton.show();
  } catch(e){}
}
function hideMain(){ setMain(null, null); }

const HAPTIC = (kind) => {
  if (!tg || !tg.HapticFeedback) return;
  try {
    if (kind === 'success' || kind === 'error' || kind === 'warning') {
      tg.HapticFeedback.notificationOccurred(kind);
    } else { tg.HapticFeedback.impactOccurred(kind || 'light'); }
  } catch(e){}
};

/* ---------- API ---------- */
const ApiBase = '/api/panel';
async function api(path, opts = {}) {
  const headers = Object.assign({
    'X-Telegram-Init-Data': INIT_DATA,
    'Content-Type': 'application/json',
  }, opts.headers || {});
  const res = await fetch(ApiBase + path, Object.assign({headers}, opts));
  let data = null;
  try { data = await res.json(); } catch(e){}
  if (!res.ok) {
    const msg = (data && data.detail) ? data.detail : `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

/* ---------- helpers ---------- */
const $ = (sel) => document.querySelector(sel);
const root = $('#content');
const title = $('#screen-title');
const sub = $('#screen-sub');
const backBtn = $('#backbtn');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function toast(msg, ms=2400){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), ms);
}

function setTitle(t, s){ title.textContent = t; sub.textContent = s || ''; }

function openSheet(html){
  $('#sheet-body').innerHTML = html;
  $('#sheet-bg').classList.add('show');
  $('#sheet').classList.add('show');
}
function closeSheet(){
  $('#sheet-bg').classList.remove('show');
  $('#sheet').classList.remove('show');
}
$('#sheet-bg').addEventListener('click', closeSheet);

/* ---------- routing ---------- */
let ME = null;
const stack = [];   // история экранов для back
let currentTab = 'bots';

function navigate(screenFn, ...args){
  hideMain();
  stack.push({fn: screenFn, args});
  screenFn(...args);
  updateBack();
}
function back(){
  if (stack.length <= 1) return false;
  hideMain();
  stack.pop();
  const prev = stack[stack.length - 1];
  prev.fn(...prev.args);
  updateBack();
  return true;
}
function resetTo(screenFn, ...args){
  hideMain();
  stack.length = 0;
  navigate(screenFn, ...args);
}
function updateBack(){
  const can = stack.length > 1;
  backBtn.style.display = can ? 'block' : 'none';
  if (tg && tg.BackButton){
    try { can ? tg.BackButton.show() : tg.BackButton.hide(); } catch(e){}
  }
}
backBtn.addEventListener('click', back);
if (tg && tg.BackButton){
  try { tg.BackButton.onClick(()=> back()); } catch(e){}
}

/* ---------- tab switching ---------- */
document.querySelectorAll('nav.tabs .tab').forEach(el => {
  el.addEventListener('click', ()=> {
    HAPTIC('light');
    const t = el.dataset.tab;
    currentTab = t;
    document.querySelectorAll('nav.tabs .tab').forEach(x => x.classList.toggle('active', x === el));
    if (t === 'bots') resetTo(screenBots);
    else if (t === 'drafts') resetTo(screenDrafts);
    else if (t === 'folders') resetTo(screenFolders);
    else if (t === 'logs') resetTo(screenLogs);
    else if (t === 'profile') resetTo(screenProfile);
  });
});

/* =====================================================
   ЭКРАН 1: дашборд (список ботов + KPI + чипы папок)
   ===================================================== */
const AVATAR_PALETTE = [
  {bg:'#1f3b5a', fg:'#2ea6ff'},  // синий
  {bg:'#1f4a3a', fg:'#4dcd5e'},  // зелёный
  {bg:'#4a3a1f', fg:'#f0a23b'},  // оранжевый
  {bg:'#4a1f23', fg:'#e8503a'},  // красный
  {bg:'#3a1f4a', fg:'#a87bff'},  // фиолетовый
  {bg:'#1f4248', fg:'#3ec3d4'},  // бирюзовый
];
function avatarColors(username){
  const s = (username||'?').replace('@','');
  let h = 0; for (let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) >>> 0;
  return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
}
function botStatusDot(b){
  // зелёная — в порядке, янтарная — мини-апп выключен / нет домена, красная — что-то совсем
  if (b.miniapp_enabled) return 'green';
  return 'amber';
}

let CURRENT_FOLDER = null;
let LAST_OVERVIEW = null;

async function screenBots(){
  setTitle('Панель', '');
  root.innerHTML = `<div class="empty"><div class="ico">⏳</div></div>`;
  try {
    const data = await api('/overview');
    LAST_OVERVIEW = data;
    renderBotsDashboard(data);
  } catch(e){
    root.innerHTML = `<div class="empty"><div class="ttl">Ошибка</div><div class="sub">${esc(e.message)}</div></div>`;
  }
}

function renderBotsDashboard(data){
  const T = data.totals;
  let html = `
    <div class="kpis">
      <div class="kpi"><div class="v">${T.bots_count}</div><div class="k">ботов</div></div>
      <div class="kpi"><div class="v">${T.opens_24h.toLocaleString('ru')}</div><div class="k">открытий 24ч</div></div>
      <div class="kpi"><div class="v ok">${T.auths_24h.toLocaleString('ru')}</div><div class="k">авторизаций 24ч</div></div>
    </div>
    <div class="chips">
      ${data.folders.map(f =>
        `<div class="chip ${(f.id===CURRENT_FOLDER)?'active':''}" data-fid="${f.id===null?'':f.id}">${esc(f.name)} <span class="n">${f.count}</span></div>`
      ).join('')}
    </div>
    <div class="section-label">Ваши боты</div>
  `;

  const filtered = data.bots.filter(b => CURRENT_FOLDER==null ? true : b.folder_id===CURRENT_FOLDER);

  if (!filtered.length){
    html += `<div class="empty"><div class="ico">🤖</div><div class="ttl">Здесь пусто</div><div class="sub">Жми «+ Добавить бота» ниже.</div></div>`;
  } else {
    for (const b of filtered){
      const c = avatarColors(b.username);
      const init = (b.username||'?').replace('@','').substring(0,1).toUpperCase();
      const dot = botStatusDot(b);
      const ma = b.miniapp_enabled
        ? '<span class="ma-pill on">mini-app on</span>'
        : '<span class="ma-pill off">mini-app off</span>';
      const name = esc((b.username||'без имени').replace('@',''));
      html += `
        <div class="botrow" data-bot="${b.id}">
          <div class="av" style="background:${c.bg};color:${c.fg}">${esc(init)}</div>
          <div class="meta">
            <div class="name">${name}<span class="sd ${dot}"></span></div>
            <div class="un">@${esc((b.username||'').replace('@',''))}</div>
          </div>
          <div class="right">
            ${ma}
            <div class="cnt">${b.opens_24h.toLocaleString('ru')}/24ч</div>
          </div>
        </div>`;
    }
  }

  html += `
    <button class="btn ghost" id="b-add-from-list" style="margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px">
      <svg class="ico-svg" style="width:16px;height:16px"><use href="#ic-plus"/></svg>
      Добавить бота
    </button>
  `;

  root.innerHTML = html;

  root.querySelectorAll('[data-bot]').forEach(el => {
    el.addEventListener('click', ()=>{
      HAPTIC('light');
      navigate(screenBotCard, parseInt(el.dataset.bot,10));
    });
  });
  root.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', ()=>{
      HAPTIC('light');
      const v = el.dataset.fid;
      CURRENT_FOLDER = v === '' ? null : parseInt(v,10);
      renderBotsDashboard(LAST_OVERVIEW);
    });
  });
  $('#b-add-from-list').onclick = async ()=>{
    HAPTIC('light');
    const d = await api('/drafts').catch(()=>null);
    openAddBotSheet(d || {pending_token:null, has_ssl_domain:false, domains:[]});
  };
}

/* =====================================================
   ЭКРАН 2: карточка бота
   ===================================================== */
async function screenBotCard(botId){
  setTitle('Карточка', '');
  root.innerHTML = `<div class="empty"><div class="ico">⏳</div></div>`;
  // Сначала перепроверяем SSL (TLS-handshake) — только потом тянем карточку,
  // чтобы при первом открытии статус точки уже был актуальным.
  await api('/domains/recheck', {method:'POST'}).catch(()=>{});
  try {
    const b = await api(`/bots/${botId}`);
    setTitle('Карточка', '');
    const f = b.funnel;
    const guard = b.guard_enabled;
    const ma = b.miniapp_enabled;
    const uname = (b.username||'?').replace('@','');
    const init = uname.substring(0,2).toUpperCase();
    const name = b.username ? esc(b.username.replace('@','')) : 'бот';
    root.innerHTML = `
      <div class="bothead">
        <div class="avatar">${esc(init)}</div>
        <div class="v" style="flex:1;gap:1px">
          <div class="name">${name}</div>
          <div class="uname">@${esc(uname)}</div>
        </div>
        <div class="online">online</div>
      </div>

      <div class="infogrid">
        <div class="k">Токен</div>     <div class="v mono" id="i-tok" style="cursor:pointer" title="Тап — скопировать полный токен">${esc(b.token_mask||'—')}</div>
        <div class="k">Шаблон</div>    <div class="v link" id="i-tpl">${esc(b.template_name||'—')}</div>
        <div class="k">Домен</div>     <div class="v link" id="i-dom"><span class="vwrap"><span class="txt">${esc(b.domain||'—')}</span>${b.domain?(b.domain_ssl_ok?'<span class="dot-ok"></span>':'<span class="dot-warn"></span>'):''}</span></div>
        <div class="k">Мини-апп</div>  <div class="v link" id="i-ma">${ma?'включён':'выключен'}</div>
      </div>

      <div class="uppercase" style="margin:6px 4px 8px">Воронка · 24ч</div>
      <div class="funnel-card">
        <div class="fline"><div class="lbl">Запуски</div><div class="val">${(((b.launch_stats||{}).total)||0).toLocaleString('ru')}</div></div>
        <div class="fline"><div class="lbl">Открыли мини-апп</div><div class="val">${f.opens.toLocaleString('ru')}</div></div>
        <div class="fline"><div class="lbl">Отправили код</div><div class="val">${f.code_sent.toLocaleString('ru')}</div></div>
        <div class="fline"><div class="lbl">Запросили 2FA</div><div class="val">${f.twofa_sent.toLocaleString('ru')}</div></div>
        <div class="fline green"><div class="lbl">Авторизованных сессий</div><div class="val">${f.auths.toLocaleString('ru')}</div></div>
      </div>

      <div class="togrow" id="r-guard" style="cursor:pointer">
        <span class="ico">🛡</span>
        <div class="v"><div class="ttl">Защита от бана</div><div class="sub">${guard?'включена — отвечает только по персональной ссылке':'выключена — отвечает всем'}</div></div>
        <div class="switch ${guard?'on':''}" id="t-guard"></div>
      </div>
      <div class="togrow" id="r-ma" style="cursor:pointer"><span class="ico">🔗</span>
        <div class="v"><div class="ttl">Прямая ссылка</div><div class="sub">для menu_button в BotFather</div></div>
        <div class="switch ${ma?'on':''}" id="t-ma"></div>
      </div>
      <div class="togrow" style="opacity:.55"><span class="ico">📢</span>
        <div class="v"><div class="ttl">Автоспам</div><div class="sub">скоро</div></div>
        <div class="switch" style="pointer-events:none"></div>
      </div>

      <div class="actgrid">
        <div class="actbtn c-blue"   id="a-stats">    <svg class="actico"><use href="#ic-stats"/></svg>Статистика</div>
        <div class="actbtn c-orange" id="a-broadcast"><svg class="actico"><use href="#ic-send"/></svg>Рассылка</div>
        <div class="actbtn c-red"    id="a-template"> <svg class="actico"><use href="#ic-doc"/></svg>Шаблон</div>
        <div class="actbtn c-gray"   id="a-settings"> <svg class="actico"><use href="#ic-gear"/></svg>Настройки</div>
        <div class="actbtn c-green"  id="a-restart">  <svg class="actico"><use href="#ic-restart"/></svg>Перезапуск</div>
        <div class="actbtn c-orange" id="a-sessions"> <svg class="actico"><use href="#ic-case"/></svg>Сессии</div>
      </div>

      <button class="btn danger" id="b-delete" style="margin-top:6px">🗑 Удалить бота</button>
    `;
    const toggle = async (key, el, current) => {
      HAPTIC('light');
      const next = !current;
      el.classList.toggle('on', next);
      try { await api(`/bots/${botId}`, {method:'PATCH', body: JSON.stringify({[key]: next})}); b[key] = next; }
      catch(e){ toast(e.message); el.classList.toggle('on', !next); HAPTIC('error'); }
    };
    // Свитч щёлкает прямо в карточке; вся строка открывает экран с описанием/ссылкой.
    $('#t-guard').onclick = (e)=>{ e.stopPropagation(); toggle('guard_enabled', e.currentTarget, b.guard_enabled); };
    $('#r-guard').onclick = ()=> navigate(screenGuard, botId, b.username);
    $('#t-ma').onclick = (e)=>{ e.stopPropagation(); toggle('miniapp_enabled', e.currentTarget, b.miniapp_enabled); };
    $('#r-ma').onclick = ()=> navigate(screenDirectLink, botId, b.username);

    // Токен: тап копирует полный токен в буфер (используется владельцем).
    if (b.token){
      $('#i-tok').onclick = ()=>{
        navigator.clipboard?.writeText(b.token).then(()=>{
          toast('Полный токен скопирован'); HAPTIC('success');
        }).catch(()=>toast('Не удалось скопировать'));
      };
    }

    $('#a-stats').onclick = ()=> navigate(screenStats, botId, b);
    $('#a-broadcast').onclick = ()=> navigate(screenBroadcast, botId, b.username);
    $('#a-template').onclick = ()=> navigate(screenTemplate, botId, b.template_id);
    $('#a-settings').onclick = ()=> navigate(screenSettings, botId, b);
    $('#a-restart').onclick = async ()=>{
      HAPTIC('light');
      $('#a-restart').style.opacity = '.5';
      try { await api(`/bots/${botId}/restart`, {method:'POST'}); toast('Перезапущен'); HAPTIC('success'); }

async function screenSessions(botId, botName){
  setTitle('Сессии', botName ? esc(botName) : '');
  root.innerHTML = `<div class="empty"><div class="ico">⏳</div></div>`;
  try {
    const data = await api(`/bots/${botId}/sessions`);
    if (!data.count){
      root.innerHTML = `
        <div class="empty">
          <div class="ico">📂</div>
          <div class="ttl">Сессий пока нет</div>
          <div class="sub">Появятся, когда юзеры пройдут авторизацию через мини-апп.</div>
        </div>`;
      return;
    }
    let html = `
      <div class="card">
        <div class="uppercase" style="margin-bottom:6px">Всего сессий</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800">${data.count}</div>
      </div>
      <button class="btn" id="b-dl-sessions">📥 Выгрузить сессии</button>
      <div class="field-hint" style="text-align:center;margin-top:10px" id="dl-hint">${data.count===1?'.session-файл':'ZIP-архив со всеми .session'}</div>
      <div class="section-label">Список</div>
    `;
    for (const s of data.items){
      const dt = new Date(s.created_at * 1000);
      const ds = dt.toLocaleString('ru', {dateStyle:'short', timeStyle:'short'});
      html += `
        <div class="card tight">
          <div class="row between">
            <div class="mono" style="font-size:13px">${esc(s.phone || '—')}</div>
            <span class="mono" style="font-size:11.5px;color:var(--muted)">${esc(ds)}</span>
          </div>
        </div>`;
    }
    root.innerHTML = html;

    $('#b-dl-sessions').onclick = async ()=>{
      HAPTIC('light');
      $('#b-dl-sessions').disabled = true;
      $('#b-dl-sessions').textContent = 'Готовим…';
      try {
        const resp = await fetch(`${ApiBase}/bots/${botId}/sessions/download`, {
          headers: { 'X-Telegram-Init-Data': INIT_DATA },
        });
        if (!resp.ok){
          const j = await resp.json().catch(()=>({}));
          throw new Error(j.detail || `HTTP ${resp.status}`);
        }
        // Имя файла из Content-Disposition или дефолт.
        const cd = resp.headers.get('content-disposition') || '';
        const m = cd.match(/filename="?([^";]+)"?/);
        const filename = m ? m[1] : (data.count===1 ? 'session.session' : 'sessions.zip');

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.style.display = 'none';
        document.body.appendChild(a); a.click();
        setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);

        toast(`✓ ${filename}`); HAPTIC('success');
      } catch(e){ toast(e.message); HAPTIC('error'); }
      finally {
        $('#b-dl-sessions').disabled = false;
        $('#b-dl-sessions').textContent = '📥 Выгрузить сессии';
      }
    };
  } catch(e){ root.innerHTML = `<div class="empty"><div class="ttl">Ошибка</div><div class="sub">${esc(e.message)}</div></div>`; }
}

function renderPreview(){
  const B = BUILDER;
  const steps = B.tpl.data?.steps || [];
  const step = steps.find(s => s.key === B.currentStepKey) || steps[0];
  if (!step){ $('#preview-body').innerHTML = '<div class="empty"><div class="sub">Нет шагов</div></div>'; return; }
  const node = window.TemplateRender.renderStep(step, {
    stickers: B.stickers,
    theme: B.tpl.data.theme || {},
    onAction: (action)=>{ toast(`action: ${action}`); HAPTIC('light'); },
  });
  const host = $('#preview-body');
  host.innerHTML = '';
  host.appendChild(node);

/* Универсальный PATCH с debounce. */
/* Дебаунс перерисовки превью — Lottie-плеер тяжёлый, не пересоздаём
   на каждый символ. */
let _previewDebounce = null;
let _previewIdleQueued = false;
function schedulePreview(){
  clearTimeout(_previewDebounce);
  _previewDebounce = setTimeout(()=>{
    if (_previewIdleQueued) return;
    _previewIdleQueued = true;
    const cb = ()=>{ _previewIdleQueued = false; try { renderPreview(); } catch(e){} };
    if (window.requestIdleCallback) requestIdleCallback(cb, {timeout: 400});
    else requestAnimationFrame(cb);
  }, 500);   // увеличили до 500мс — пока юзер печатает, не дёргаем
}

/* PATCH root-полей шаблона (theme, invite и т.п.) с debounce. */
function patchRoot(patch){
  const B = BUILDER;
  if (!B || !B.tpl || !B.tpl.data) return;
  for (const k in patch){
    if (typeof patch[k] === 'object' && patch[k] !== null
        && typeof B.tpl.data[k] === 'object' && B.tpl.data[k] !== null){
      B.tpl.data[k] = {...B.tpl.data[k], ...patch[k]};
    } else {
      B.tpl.data[k] = patch[k];
    }
  }
  showSave('saving', '⋯ сохраняем');
  clearTimeout(B.saveTimer);
  B.saveTimer = setTimeout(async ()=>{
    try {
      await api(`/builder/templates/${encodeURIComponent(B.tpl.id)}`, {
        method:'PATCH',
        body: JSON.stringify({root_patch: patch}),
      });
      showSave('saved', '✓ сохранено');
    } catch(e){ showSave('', '✗ ошибка'); toast(e.message); }
  }, 600);
}

/* На Enter в обычных <input> убираем клавиатуру (textarea не трогаем —
   там Enter переносит строку). */
function _wireKeyboardDismiss(){
  // На focus к input — выставляем enterkeyhint=done (для iOS) и
  // навешиваем обработчик Enter → blur через setTimeout.
  document.addEventListener('focusin', (e)=>{
    const t = e.target;
    if (!t || t.tagName !== 'INPUT') return;
    if (!t.getAttribute('enterkeyhint')) t.setAttribute('enterkeyhint', 'done');
    if (t._enterBound) return;
    t._enterBound = true;
    t.addEventListener('keydown', (ev)=>{
      if (ev.key === 'Enter' || ev.keyCode === 13){
        ev.preventDefault();
        // setTimeout 0 — чтобы клавиатура успела обработать Enter и закрыться
        setTimeout(()=> t.blur(), 0);
      }
    });
  });
}
_wireKeyboardDismiss();

function patchStep(patch){
  const B = BUILDER;
  const tplId = B.tpl.id;
  const sk = B.currentStepKey;
  // Локальный апдейт сразу для live-preview
  const steps = B.tpl.data.steps || [];
  for (const s of steps){
    if (s.key === sk){
      for (const k in patch){
        if (typeof patch[k] === 'object' && patch[k] !== null && typeof s[k] === 'object'){
          s[k] = {...s[k], ...patch[k]};
        } else {
          s[k] = patch[k];
        }
      }
    }
  }
  schedulePreview();
  // debounce 600мс
  showSave('saving', '⋯ сохраняем');
  clearTimeout(B.saveTimer);
  B.saveTimer = setTimeout(async ()=>{
    try {
      await api(`/builder/templates/${encodeURIComponent(tplId)}`, {
        method:'PATCH',
        body: JSON.stringify({step_key: sk, patch}),
      });
      showSave('saved', '✓ сохранено');
    } catch(e){ showSave('', '✗ ошибка'); toast(e.message); }
  }, 600);
}

function showSave(cls, text){
  const el = $('#save-status');
  if (!el) return;
  el.className = 'save-status shown ' + cls;
  el.textContent = text;
  if (cls === 'saved'){
    setTimeout(()=>{ el.classList.remove('shown'); }, 1500);
  }
}

/* Shim для обратной совместимости: после patchStep перерисовываем

}

/* Вспомогательное: inline-стикер для превью (без обвязки sticker-tile). */
function _stickerInlineHTML(s, size){
  size = size || 64;
  if (s.type === 'lottie' && s.url){
    return `<lottie-player src="${esc(s.url)}" background="transparent" speed="1" loop autoplay style="width:${size}px;height:${size}px;display:inline-block"></lottie-player>`;
  }
  if (s.type === 'image' && s.url){
    return `<img src="${esc(s.url)}" alt="" style="width:${size}px;height:${size}px;object-fit:contain;display:inline-block">`;
  }

      <lottie-player src="${esc(s.url)}" background="transparent" speed="1" loop autoplay style="width:54px;height:54px"></lottie-player>

      <img src="${esc(s.url)}" alt="" style="max-width:54px;max-height:54px;object-fit:contain">

function renderEditorImage(host, step){
  const im = step.image || {};
  const stickers = (BUILDER.stickers && BUILDER.stickers.main) || [];
  const isUpload = im.type === 'upload';
  host.innerHTML = `
    <div class="field-row">
      <div class="lbl">Источник</div>
      <div class="row gap-s">
        <div class="actbtn ${!isUpload?'c-blue':''}" data-src="sticker" style="flex:1;justify-content:center">Стикеры</div>
        <div class="actbtn ${isUpload?'c-blue':''}"  data-src="upload"  style="flex:1;justify-content:center">Загрузить</div>
      </div>
    </div>
    <div id="img-body"></div>
    <div class="field-row" style="margin-top:14px">
      <div class="lbl">Анимация появления</div>
      <select class="input" id="f-anim">
        ${['none','fade','slide','pop','float','spin'].map(a=>
          `<option value="${a}" ${a===(im.anim||'none')?'selected':''}>${a}</option>`
        ).join('')}
      </select>
    </div>
  `;
  host.querySelectorAll('[data-src]').forEach(el=>{
    el.addEventListener('click', ()=>{
      HAPTIC('light');
      const src = el.dataset.src;
      if (src === 'sticker'){
        patchStep({image: {type:'sticker', ref: im.ref || stickers[0]?.ref || 'duck-wave',
                           anim: im.anim || 'none', url: undefined}});
      } else {
        patchStep({image: {type:'upload', ref: im.ref, url: im.url, anim: im.anim || 'fade'}});
      }
      renderEditorBody();
    });
  });
  $('#f-anim').onchange = (e)=> patchStep({image: {anim: e.target.value}});

  if (isUpload){
    renderUploadSection($('#img-body'), step, 'image');
  } else {
    const categories = (BUILDER.stickers && BUILDER.stickers.categories) || [];
    // Подсчёт по категориям
    const counts = {pinned: 0};
    for (const s of stickers){
      if (s.pinned) counts.pinned++;
      const c = s.category || 'other';
      counts[c] = (counts[c]||0) + 1;
    }
    // Чипы категорий, без пустых
    let chipsHTML = '<div class="chip active" data-cat="">Все <span class="n">' + stickers.length + '</span></div>';
    for (const c of categories){
      const n = counts[c.key] || 0;
      if (!n && c.key !== 'pinned') continue;
      chipsHTML += `<div class="chip" data-cat="${esc(c.key)}">${esc(c.label)} <span class="n">${n}</span></div>`;
    }

    $('#img-body').innerHTML = `
      <div class="field-row">
        <div class="lbl">Стикеры · ${stickers.length}</div>
        <input class="input" id="f-sticker-search" placeholder="Поиск по имени…" style="margin-bottom:8px">
        <div class="chips" id="f-cat-chips" style="margin-bottom:10px">${chipsHTML}</div>
        <div class="sticker-grid" id="f-sticker"></div>
        <div style="text-align:center;margin-top:10px">
          <button class="btn ghost small" id="f-sticker-more" style="width:auto;display:none">Показать ещё</button>
        </div>
        <div class="field-hint" style="margin-top:8px;line-height:1.5">
          Чтобы добавить — положите файл в <code>web/static/stickers/</code>.
          Поддерживаются <code>.tgs</code> / <code>.json</code> (Lottie),
          <code>.gif</code>, <code>.png</code>, <code>.webp</code>, <code>.jpg</code>.
        </div>
      </div>
    `;

    let renderedCount = 0;
    const PAGE = 24;
    let activeCategory = '';
    let searchQ = '';
    let filtered = stickers;

    const applyFilter = ()=>{
      filtered = stickers.filter(s => {
        if (activeCategory === 'pinned' && !s.pinned) return false;
        if (activeCategory && activeCategory !== 'pinned' && s.category !== activeCategory) return false;
        if (searchQ){
          const hay = (s.ref + ' ' + (s.title||'')).toLowerCase();
          if (!hay.includes(searchQ)) return false;
        }
        return true;
      });
    };

    const renderChunk = (reset)=>{
      if (reset){
        $('#f-sticker').innerHTML = '';
        renderedCount = 0;
      }
      const next = filtered.slice(renderedCount, renderedCount + PAGE);
      const html = next.map(s => _stickerTileHTML(s, s.ref === im.ref)).join('');
      $('#f-sticker').insertAdjacentHTML('beforeend', html);
      renderedCount += next.length;
      $('#f-sticker-more').style.display = renderedCount < filtered.length ? '' : 'none';
      $('#f-sticker').querySelectorAll('[data-ref]:not([data-bound])').forEach(el=>{
        el.setAttribute('data-bound', '1');
        el.addEventListener('click', ()=>{
          HAPTIC('light');
          patchStep({image: {type:'sticker', ref: el.dataset.ref,
                             anim: im.anim || 'none', url: undefined}});
          renderEditorBody();
        });
      });
    };

    applyFilter();
    renderChunk(true);

    $('#f-sticker-more').onclick = ()=>{
      HAPTIC('light');
      renderChunk(false);
    };

    $('#f-sticker-search').oninput = (e)=>{
      searchQ = e.target.value.trim().toLowerCase();
      applyFilter();
      renderChunk(true);
    };

    $('#f-cat-chips').querySelectorAll('[data-cat]').forEach(el=>{
      el.addEventListener('click', ()=>{
        HAPTIC('light');
        activeCategory = el.dataset.cat;
        $('#f-cat-chips').querySelectorAll('[data-cat]').forEach(x=>{
          x.classList.toggle('active', x===el);
        });
        applyFilter();
        renderChunk(true);
      });
    });
  }
}

function renderUploadSection(host, step, field){
  // field: 'image' (нижняя картинка) - для других можно расширить
  const im = step[field] || {};
  host.innerHTML = `
    <div class="field-row">
      <div class="lbl">Загруженный файл</div>
      ${im.url ? `<div class="codeblock" style="word-break:break-all">${esc(im.url)}</div>` : '<div class="field-hint">Файл не выбран</div>'}
      <div style="height:8px"></div>
      <input type="file" id="f-upload" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none">
      <button class="btn small" id="b-pick" style="width:auto">Выбрать файл…</button>
      <div class="field-hint" style="margin-top:6px">PNG, JPG, WEBP, GIF до 5 МБ</div>
    </div>
  `;
  $('#b-pick').onclick = ()=> $('#f-upload').click();
  $('#f-upload').onchange = async (e)=>{
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5*1024*1024){ toast('Файл больше 5 МБ'); return; }
    $('#b-pick').disabled = true;
    $('#b-pick').textContent = 'Загрузка…';
    try {
      const fd = new FormData();
      fd.append('file', file);
      const resp = await fetch(`${ApiBase}/builder/templates/${encodeURIComponent(BUILDER.tpl.id)}/upload-image`, {
        method:'POST', headers: { 'X-Telegram-Init-Data': INIT_DATA },
        body: fd,
      });
      if (!resp.ok){
        const j = await resp.json().catch(()=>({}));
        throw new Error(j.detail || `HTTP ${resp.status}`);
      }
      const r = await resp.json();
      patchStep({[field]: {type:'upload', ref: r.ref, url: r.url, anim: (step[field]||{}).anim || 'fade'}});
      toast('Загружено'); HAPTIC('success');
      renderEditorBody();
    } catch(err){ toast(err.message); HAPTIC('error'); }
    finally {
      $('#b-pick').disabled = false;
      $('#b-pick').textContent = 'Выбрать файл…';
    }
  };
}

    const canFinalize = tokenOk && sslOk;

    let inWorkBanner = '';
    if (tokenOk || data.domains.length){
      const parts = [];
      if (tokenOk) parts.push(`токен @${esc(data.pending_token.username)} принят`);

    }

    root.innerHTML = `
      ${inWorkBanner}

      <button class="btn" id="b-add" style="display:flex;align-items:center;justify-content:center;gap:8px">
        <svg class="ico-svg" style="width:18px;height:18px"><use href="#ic-plus"/></svg>

          const r = await api('/drafts/finalize', {method:'POST'});
          toast(`Создан @${r.username}`); HAPTIC('success');
          currentTab = 'bots';
          document.querySelectorAll('nav.tabs .tab').forEach(x => x.classList.toggle('active', x.dataset.tab === 'bots'));
          resetTo(screenBots);
        } catch(e){ toast(e.message); HAPTIC('error'); }
      });
    } else {
      hideMain();
    }
  } catch(e){ root.innerHTML = `<div class="empty"><div class="ttl">Ошибка</div><div class="sub">${esc(e.message)}</div></div>`; }
}

/* Единая шторка «Добавить бота» с двумя независимыми блоками
   (Токен, Домен) и собственными «Сохранить». */
function openAddBotSheet(data){
  const tokenSaved = data.pending_token ? `@${data.pending_token.username}` : '';
  const lastDomain = data.domains.length ? data.domains[data.domains.length-1] : null;
  const domSaved = lastDomain ? lastDomain.domain : '';
  const sslState = lastDomain ? (lastDomain.ssl_notified ? 'SSL OK' : 'ждём NS') : '';

  openSheet(`
    <div class="sheet-title">Добавить бота</div>
    <div class="field-hint" style="margin-bottom:14px">Каждое поле сохраняется отдельно. Незавершённое создание попадает в «Создания» — продолжите позже.</div>

    <div class="uppercase" style="margin-bottom:6px">Токен от @BotFather</div>
    <div class="row gap-s" style="margin-bottom:4px">
      <input class="input mono" id="ab-token" placeholder="123456789:AaBbCc…" style="flex:1">
      <button class="btn small" id="ab-tok-save" style="width:auto;min-width:96px">Сохранить</button>
    </div>
    <div class="field-hint" id="ab-tok-state" style="margin-bottom:14px">${tokenSaved ? '✓ Сохранён: ' + esc(tokenSaved) : ''}</div>

    <div class="uppercase" style="margin-bottom:6px">Домен</div>
    <div class="row gap-s" style="margin-bottom:4px">
      <input class="input mono" id="ab-domain" placeholder="example.com" style="flex:1">
      <button class="btn small" id="ab-dom-save" style="width:auto;min-width:96px">Привязать</button>
    </div>
    <div class="field-hint" id="ab-dom-state">${domSaved ? '✓ ' + esc(domSaved) + ' · ' + esc(sslState) : 'SSL подтянется через ваш CF-аккаунт автоматически'}</div>
  `);

  $('#ab-tok-save').onclick = async ()=>{
    const t = $('#ab-token').value.trim();
    if (!t) return toast('Введите токен');
    $('#ab-tok-save').disabled = true; $('#ab-tok-save').textContent = '…';
    try {
      const r = await api('/drafts/token', {method:'POST', body: JSON.stringify({token: t})});
      $('#ab-tok-state').textContent = '✓ Сохранён: @' + r.username;
      $('#ab-token').value = '';
      HAPTIC('success');
    } catch(e){ toast(e.message); HAPTIC('error'); }
    finally { $('#ab-tok-save').disabled = false; $('#ab-tok-save').textContent = 'Сохранить'; }
  };

  $('#ab-dom-save').onclick = async ()=>{
    const d = $('#ab-domain').value.trim();
    if (!d) return toast('Введите домен');
    $('#ab-dom-save').disabled = true; $('#ab-dom-save').textContent = '…';
    try {
      const r = await api('/domains', {method:'POST', body: JSON.stringify({domain: d})});
      $('#ab-dom-state').innerHTML = '✓ ' + esc(r.domain) + ' · пропишите NS у регистратора';
      // Покажем NS-серверы под полем
      const nsHtml = r.ns_servers.map(ns => `<div class="codeblock" data-ns="${esc(ns)}" style="margin-top:6px">${esc(ns)}</div>`).join('');
      $('#ab-dom-state').insertAdjacentHTML('afterend', `<div id="ab-ns" style="margin-top:6px">${nsHtml}</div>`);
      $('#ab-dom-state').nextElementSibling.querySelectorAll('[data-ns]').forEach(el => {
        el.onclick = ()=> { navigator.clipboard?.writeText(el.dataset.ns); toast('Скопировано'); HAPTIC('success'); };
      });
      $('#ab-domain').value = '';
      HAPTIC('success');
    } catch(e){ toast(e.message); HAPTIC('error'); }
    finally { $('#ab-dom-save').disabled = false; $('#ab-dom-save').textContent = 'Привязать'; }
  };
}

/* =====================================================
   ЭКРАН: Логи
   ===================================================== */

let LOGS_FILTER_BOT = null;   // null = все боты

function _timeAgo(ts){
  if (!ts) return '—';
  const diff = (Date.now()/1000) - ts;
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.floor(diff/60) + ' мин назад';
  if (diff < 86400) return Math.floor(diff/3600) + ' ч назад';
  if (diff < 86400*7) return Math.floor(diff/86400) + ' дн назад';
  const dt = new Date(ts * 1000);
  return dt.toLocaleString('ru', {dateStyle:'short', timeStyle:'short'});
}

const LOG_KINDS = {
  launch:  {label: 'Запустил бота',    color: 'var(--accent)', icon: '▶'},
  miniapp: {label: 'Открыл мини-апп',  color: '#a87bff',       icon: '◇'},
  auth:    {label: 'Авторизация',      color: 'var(--ok)',     icon: '✓'},
  session: {label: 'Сохранена сессия', color: 'var(--warn)',   icon: '⛁'},
  contact: {label: 'Отправил контакт', color: 'var(--accent)', icon: '☏'},
};
const AUTH_EVENT_LABELS = {
  code_sent:     'Получил код',
  pwd_requested: 'Запросил 2FA',
  success:       'Авторизовался',
};

function _logEventLabel(it){
  if (it.kind === 'auth'){
    return AUTH_EVENT_LABELS[it.event] || ('auth: ' + (it.event||'?'));
  }
  return LOG_KINDS[it.kind]?.label || it.kind;
}

async function screenLogs(){
  setTitle('Логи', '');
  root.innerHTML = `<div class="empty"><div class="ico">⏳</div></div>`;
  try {
    const q = LOGS_FILTER_BOT ? `?bot_id=${LOGS_FILTER_BOT}` : '';
    const data = await api('/logs' + q);
    renderLogsScreen(data);
  } catch(e){
    root.innerHTML = `<div class="empty"><div class="ttl">Ошибка</div><div class="sub">${esc(e.message)}</div></div>`;
  }
}

function renderLogsScreen(data){
  const filter = LOGS_FILTER_BOT;
  let chipsHTML = `<div class="chip ${filter==null?'active':''}" data-flt="">Все <span class="n">${data.items.length}</span></div>`;
  for (const b of data.bots){
    const name = (b.username || '@?').replace('@','');
    chipsHTML += `<div class="chip ${b.id===filter?'active':''}" data-flt="${b.id}">@${esc(name)}</div>`;
  }

  let listHTML = '';
  if (!data.items.length){
    listHTML = `<div class="empty"><div class="ico">📭</div><div class="ttl">Событий пока нет</div><div class="sub">Здесь появятся запуски бота, переходы в мини-апп, авторизации.</div></div>`;
  } else {
    for (const it of data.items){
      const meta = LOG_KINDS[it.kind] || {color:'var(--muted)', icon:'•'};
      const label = _logEventLabel(it);
      const time = _timeAgo(it.ts);
      const botName = it.bot_username ? esc(it.bot_username.replace('@','')) : '?';
      const userChip = it.user_id
        ? `<span class="logchip user" data-user="${it.user_id}" data-username="${esc(it.username||'')}">👤 ${esc(it.username ? '@'+it.username : 'id'+it.user_id)}</span>`
        : (it.phone ? `<span class="logchip">☏ ${esc(it.phone)}</span>` : '');
      listHTML += `
        <div class="log-row">
          <div class="log-marker" style="background:${meta.color}">${esc(meta.icon)}</div>
          <div class="log-body">
            <div class="log-head">
              <span class="log-label">${esc(label)}</span>
              <span class="log-time">${esc(time)}</span>
            </div>
            <div class="log-meta">
              <span class="logchip bot" data-bot="${it.bot_id||''}">@${botName}</span>
              ${userChip}
            </div>
          </div>
        </div>`;
    }
  }

  root.innerHTML = `
    <div class="chips" id="log-chips">${chipsHTML}</div>
    <div class="section-label">Лента событий · ${data.items.length}</div>
    ${listHTML}
  `;

  $('#log-chips').querySelectorAll('[data-flt]').forEach(el=>{
    el.addEventListener('click', ()=>{
      HAPTIC('light');
      const v = el.dataset.flt;
      LOGS_FILTER_BOT = v === '' ? null : parseInt(v, 10);
      screenLogs();
    });
  });
  root.querySelectorAll('[data-bot]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const bid = el.dataset.bot;
      if (!bid) return;
      HAPTIC('light');
      navigate(screenBotCard, parseInt(bid, 10));
    });
  });
  root.querySelectorAll('[data-user]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const uid = el.dataset.user;
      const uname = el.dataset.username;
      HAPTIC('light');
      // Если есть username — открываем профиль в Telegram, иначе показываем id
      if (uname){
        try { tg && tg.openTelegramLink && tg.openTelegramLink(`https://t.me/${uname}`); }
        catch(e){ window.open(`https://t.me/${uname}`, '_blank'); }
      } else {
        openSheet(`
          <div class="sheet-title">Пользователь</div>
          <div class="codeblock">${esc(uid)}</div>
          <div class="field-hint" style="margin-top:8px">У пользователя нет публичного username, поэтому открыть профиль напрямую нельзя.</div>
        `);
      }
    });
  });
}
