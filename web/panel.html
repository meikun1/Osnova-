<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Панель управления</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#17212b; --card:#1c2734; --card-border:#232e3c;
    --input-bg:#0e161e; --input-border:#1e2832; --hairline:#1a2330;
    --text:#fff; --text-soft:#cdd6e0; --muted:#8b9aab; --label:#708499; --hint:#5b6877;
    --accent:#2ea6ff; --accent-soft:#1f3b5a;
    --ok:#4dcd5e; --ok-bg:#1f3b2c;
    --warn:#f0a23b; --warn-bg:#2f2a1f;
    --err:#e8503a; --err-bg:#4a2027;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    height:100%;overflow:hidden;-webkit-text-size-adjust:100%;}
  body{display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);}
  .mono{font-family:'JetBrains Mono',monospace;font-size:.9em}
  .uppercase{text-transform:uppercase;letter-spacing:.05em;font-size:11px;font-weight:700;color:var(--label)}
  .hidden{display:none!important}

  /* топбар */
  .topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;
    border-bottom:1px solid var(--hairline);min-height:44px;}
  .topbar .title{flex:1;font-size:18px;font-weight:700}
  .topbar .sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  /* Своя back-стрелка скрыта всегда — используем нативный Telegram BackButton */
  .topbar .back{display:none!important}

  /* контент */
  main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
    padding:14px 14px 80px;}

  /* нижняя навигация */
  nav.tabs{display:flex;border-top:1px solid var(--hairline);background:var(--bg);
    padding:8px 8px 6px;}
  nav.tabs .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--muted);cursor:pointer;padding:6px 4px;font-size:11px;font-weight:600;}
  nav.tabs .tab.active{color:var(--accent)}
  nav.tabs .tab .ico{font-size:20px;line-height:1}
  .ico-svg{width:22px;height:22px;display:block;color:currentColor;}

  /* карточки */
  .card{background:var(--card);border:1px solid var(--card-border);
    border-radius:14px;padding:14px;margin-bottom:10px}
  .card.tight{padding:12px}
  .row{display:flex;align-items:center;gap:10px}
  .row.between{justify-content:space-between}
  .gap-s{gap:6px} .gap-m{gap:10px} .gap-l{gap:14px}
  .v{display:flex;flex-direction:column;gap:6px}

  .section-label{padding:14px 4px 6px;color:var(--label);font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.05em}

  /* бот в списке */
  .bot-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);
    border:1px solid var(--card-border);border-radius:14px;margin-bottom:8px;cursor:pointer;
    min-height:60px;transition:.1s background;}
  .bot-item:active{background:#202d3c}
  .avatar{width:40px;height:40px;border-radius:12px;background:var(--accent-soft);
    color:var(--accent);display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;flex-shrink:0}
  .bot-name{font-size:14.5px;font-weight:600;line-height:1.2}
  .bot-meta{font-size:12px;color:var(--muted);line-height:1.2;margin-top:3px}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:9px;
    font-size:10.5px;font-weight:600;line-height:1.5;}
  .pill.ok{background:var(--ok-bg);color:var(--ok)}
  .pill.warn{background:var(--warn-bg);color:var(--warn)}
  .pill.err{background:var(--err-bg);color:var(--err)}
  .pill.muted{background:var(--input-bg);color:var(--muted)}
  .pill.dot::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}

  /* метрики (воронка) */
  .funnel{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .metric{background:var(--input-bg);border:1px solid var(--input-border);
    border-radius:12px;padding:11px 12px;}
  .metric .label{font-size:11px;color:var(--label);text-transform:uppercase;
    letter-spacing:.04em;font-weight:700;}
  .metric .value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;
    margin-top:4px;color:var(--text);}

  /* кнопки */
  .btn{display:flex;align-items:center;justify-content:center;width:100%;border:none;
    border-radius:12px;padding:14px 18px;font-size:15px;font-weight:700;cursor:pointer;
    background:var(--accent);color:#fff;-webkit-appearance:none;font-family:inherit;}
  .btn:active{filter:brightness(.92)}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent-soft);}
  .btn.danger{background:var(--err)}
  .btn.muted{background:var(--input-bg);color:var(--text-soft);border:1px solid var(--input-border);}
  .btn.small{padding:9px 12px;font-size:13px;font-weight:600}

  /* инпуты */
  .input,.textarea{width:100%;background:var(--input-bg);border:1px solid var(--input-border);
    border-radius:12px;padding:12px 14px;color:var(--text);font-size:14.5px;
    font-family:inherit;outline:none;-webkit-appearance:none;}
  .input:focus,.textarea:focus{border-color:var(--accent)}
  .textarea{resize:vertical;min-height:90px;font-family:inherit}
  .field-hint{font-size:11.5px;color:var(--hint);margin-top:5px;line-height:1.4}

  /* свитч */
  .switch{position:relative;width:42px;height:25px;background:#384655;border-radius:13px;
    transition:.18s;flex-shrink:0;cursor:pointer}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;
    background:#fff;border-radius:50%;transition:.18s;}
  .switch.on{background:var(--accent)}
  .switch.on::after{left:19px}

  /* шторка */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none;
    animation:bgIn .15s ease-out}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-radius:24px 24px 0 0;
    z-index:51;display:none;animation:sheetUp .22s cubic-bezier(.18,.89,.32,1.28);
    padding:18px 16px calc(28px + env(safe-area-inset-bottom));max-height:90%;overflow-y:auto;}
  .sheet.show, .sheet-bg.show{display:block}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:#384655;margin:0 auto 12px}
  .sheet-title{font-size:17px;font-weight:700;margin-bottom:14px}
  @keyframes bgIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}

  /* код / моно блоки */
  .codeblock{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--input-bg);
    border:1px solid var(--input-border);padding:10px 12px;border-radius:10px;color:var(--text-soft);
    word-break:break-all;cursor:pointer;}
  .codeblock:active{background:#0a1219}

  /* KPI-полоса дашборда */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .kpi{background:var(--card);border:1px solid var(--card-border);border-radius:14px;
    padding:11px 10px;text-align:center}
  .kpi .v{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;
    color:var(--text);letter-spacing:.01em}
  .kpi .v.ok{color:var(--ok)}
  .kpi .k{font-size:11px;color:var(--muted);margin-top:3px;text-transform:lowercase}

  /* чипы папок */
  .chips{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:4px;margin-bottom:8px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;
    background:var(--card);border:1px solid var(--card-border);color:var(--text-soft);
    font-size:13px;font-weight:600;flex-shrink:0;cursor:pointer;white-space:nowrap}
  .chip.active{background:var(--accent);color:#fff;border-color:transparent}
  .chip .n{opacity:.7;font-weight:700}
  .chip.active .n{opacity:.85}

  /* строка бота в дашборде */
  .botrow{display:flex;align-items:center;gap:12px;padding:11px 12px;background:var(--card);
    border:1px solid var(--card-border);border-radius:14px;margin-bottom:8px;cursor:pointer;
    min-height:62px}
  .botrow:active{background:#202d3c}
  .botrow .av{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .botrow .meta{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
  .botrow .name{display:flex;align-items:center;gap:6px;font-size:14.5px;font-weight:700;color:var(--text)}
  .botrow .name .sd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .botrow .name .sd.green{background:var(--ok)}
  .botrow .name .sd.amber{background:var(--warn)}
  .botrow .name .sd.red{background:var(--err)}
  .botrow .un{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .botrow .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .ma-pill{font-size:10.5px;font-weight:700;padding:2.5px 8px;border-radius:9px;letter-spacing:.02em}
  .ma-pill.on{background:var(--accent-soft);color:var(--accent)}
  .ma-pill.off{color:var(--muted)}
  .ma-pill.off::before{content:""}
  .botrow .cnt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text-soft)}

  /* шапка бота */
  .bothead{display:flex;align-items:center;gap:11px;padding:11px 12px;background:var(--card);
    border:1px solid var(--card-border);border-radius:14px;margin-bottom:8px;}
  .bothead .avatar{width:42px;height:42px;border-radius:12px;font-size:16px;flex-shrink:0;}
  .bothead .name{font-size:16px;font-weight:800;line-height:1.15}
  .bothead .uname{font-size:12px;color:var(--muted);margin-top:1px;font-family:'JetBrains Mono',monospace}
  .bothead .online{display:inline-flex;align-items:center;gap:5px;background:var(--ok-bg);
    color:var(--ok);font-size:11px;font-weight:600;padding:3px 9px;border-radius:11px;flex-shrink:0;}
  .bothead .online::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}

  /* строки инфо */
  .infogrid{display:grid;grid-template-columns:auto 1fr;gap:7px 16px;padding:12px 14px;
    background:var(--card);border:1px solid var(--card-border);border-radius:14px;
    font-size:13.5px;margin-bottom:12px;align-items:center;}
  .infogrid > .k,.infogrid > .v{display:flex;align-items:center;}
  .infogrid > .k{color:var(--label);font-weight:500;}
  .infogrid > .v{font-weight:700;color:var(--text);justify-content:flex-end;gap:6px;
    white-space:nowrap;}
  .infogrid > .v.link{color:var(--accent);}
  .infogrid > .v.mono{font-family:'JetBrains Mono',monospace;font-size:13px;}
  .infogrid .dot-ok,.infogrid .dot-warn{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .infogrid .dot-ok{background:var(--ok);}
  .infogrid .dot-warn{background:var(--warn);}

  /* воронка — одна общая карточка с внутренними разделителями */
  .funnel-card{background:var(--card);border:1px solid var(--card-border);
    border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .fline{display:flex;align-items:center;gap:12px;padding:13px 14px 13px 18px;
    position:relative;}
  .fline + .fline{border-top:1px solid var(--hairline);}
  .fline::before{content:"";position:absolute;left:10px;top:14px;bottom:14px;width:3px;
    border-radius:2px;background:var(--accent);}
  .fline.green::before{background:var(--ok);}
  .fline .lbl{flex:1;color:var(--text-soft);font-size:14px;font-weight:500;}
  .fline .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;
    color:var(--text);letter-spacing:.02em;}
  .fline.green .val{color:var(--ok);}

  /* toggle-row */
  .togrow{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);
    border:1px solid var(--card-border);border-radius:14px;margin-bottom:8px;}
  .togrow .ico{font-size:18px;width:24px;text-align:center}
  .togrow .v{flex:1;display:flex;flex-direction:column;gap:1px}
  .togrow .ttl{font-size:14.5px;font-weight:600;color:var(--text)}
  .togrow .sub{font-size:11.5px;color:var(--muted)}

  /* 3x2 квадратные действия */
  .actgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;margin-bottom:10px;}
  .actbtn{background:var(--card);border:1px solid var(--card-border);border-radius:14px;
    padding:13px 14px;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:700;
    color:var(--text);cursor:pointer;text-align:left;}
  .actbtn:active{background:#202d3c}
  .actbtn .actico{width:20px;height:20px;flex-shrink:0;display:block}
  .actbtn .actico use{display:block}
  /* цвета per-кнопка */
  .actbtn.c-blue   .actico{color:#2ea6ff}
  .actbtn.c-orange .actico{color:#f0a23b}
  .actbtn.c-red    .actico{color:#e8503a}
  .actbtn.c-gray   .actico{color:#8b9aab}
  .actbtn.c-green  .actico{color:#4dcd5e}

  /* пустые состояния */
  .empty{text-align:center;padding:36px 18px;color:var(--muted)}
  .empty .ico{font-size:38px;margin-bottom:10px}
  .empty .ttl{font-size:15px;font-weight:600;color:var(--text-soft);margin-bottom:4px}
  .empty .sub{font-size:12.5px;line-height:1.5}

  /* тосты */
  #toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#0b1117;
    color:#fff;padding:12px 16px;border-radius:10px;font-size:13.5px;border:1px solid #2a3947;
    z-index:200;display:none;max-width:80%;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.4)}
  #toast.show{display:block}
</style>
</head>
<body>
  <div class="topbar">
    <span class="back" id="backbtn">‹</span>
    <div class="v" style="gap:1px">
      <div class="title" id="screen-title">Панель</div>
      <div class="sub" id="screen-sub"></div>
    </div>
  </div>

  <main id="content"></main>

  <!-- SVG спрайт из прототипа (stroke=1.9, viewBox 0 0 24 24, currentColor) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="ic-bots" viewBox="0 0 24 24"><rect x="3" y="3" width="7.5" height="7.5" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.9"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.9"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.9"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.9"/></symbol>
      <symbol id="ic-drafts" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 4v5h-5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="ic-folders" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" fill="none" stroke="currentColor" stroke-width="1.9"/></symbol>
      <symbol id="ic-profile" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></symbol>
      <symbol id="ic-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></symbol>
      <symbol id="ic-back" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <!-- Цветные иконки для 6 действий карточки бота -->
      <symbol id="ic-stats" viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.9"/><rect x="10" y="8" width="4" height="13" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.9"/><rect x="17" y="4" width="4" height="17" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.9"/></symbol>
      <symbol id="ic-send" viewBox="0 0 24 24"><path d="M22 2 11 13" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2l-7 20-4-9-9-4 20-7Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="ic-doc" viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/><path d="M14 3v6h6" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></symbol>
      <symbol id="ic-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.9"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h.1a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></symbol>
      <symbol id="ic-restart" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 4v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="ic-case" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.9"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></symbol>
    </defs>
  </svg>

  <nav class="tabs">
    <div class="tab active" data-tab="bots"><svg class="ico-svg"><use href="#ic-bots"/></svg>Боты</div>
    <div class="tab" data-tab="drafts"><svg class="ico-svg"><use href="#ic-drafts"/></svg>Создания</div>
    <div class="tab" data-tab="folders"><svg class="ico-svg"><use href="#ic-folders"/></svg>Папки</div>
    <div class="tab" data-tab="profile"><svg class="ico-svg"><use href="#ic-profile"/></svg>Профиль</div>
  </nav>

  <div class="sheet-bg" id="sheet-bg"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-body"></div>
  </div>

  <div id="toast"></div>

<script>
/* ---------- Telegram WebApp init ---------- */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) {
  try { tg.ready(); } catch(e){}
  try { tg.expand(); } catch(e){}
  try { tg.setHeaderColor('#17212b'); } catch(e){}
  try { tg.setBackgroundColor('#17212b'); } catch(e){}
}
const INIT_DATA = tg ? tg.initData : "";
const USER = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null;

/* MainButton helper. Передаём callback и текст, отписку делаем при смене экрана. */
let _mainCB = null;
function setMain(text, cb){
  if (!tg || !tg.MainButton){ return; }
  try {
    if (_mainCB){ tg.MainButton.offClick(_mainCB); _mainCB = null; }
    if (!text || !cb){ tg.MainButton.hide(); return; }
    tg.MainButton.setText(text);
    _mainCB = cb;
    tg.MainButton.onClick(cb);
    tg.MainButton.show();
  } catch(e){}
}
function hideMain(){ setMain(null, null); }

const HAPTIC = (kind) => {
  if (!tg || !tg.HapticFeedback) return;
  try {
    if (kind === 'success' || kind === 'error' || kind === 'warning') {
      tg.HapticFeedback.notificationOccurred(kind);
    } else { tg.HapticFeedback.impactOccurred(kind || 'light'); }
  } catch(e){}
};

/* ---------- API ---------- */
const ApiBase = '/api/panel';
async function api(path, opts = {}) {
  const headers = Object.assign({
    'X-Telegram-Init-Data': INIT_DATA,
    'Content-Type': 'application/json',
  }, opts.headers || {});
  const res = await fetch(ApiBase + path, Object.assign({headers}, opts));
  let data = null;
  try { data = await res.json(); } catch(e){}
  if (!res.ok) {
    const msg = (data && data.detail) ? data.detail : `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

/* ---------- helpers ---------- */
const $ = (sel) => document.querySelector(sel);
const root = $('#content');
const title = $('#screen-title');
const sub = $('#screen-sub');
const backBtn = $('#backbtn');

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function toast(msg, ms=2400){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), ms);
}

function setTitle(t, s){ title.textContent = t; sub.textContent = s || ''; }

function openSheet(html){
  $('#sheet-body').innerHTML = html;
  $('#sheet-bg').classList.add('show');
  $('#sheet').classList.add('show');
}
function closeSheet(){
  $('#sheet-bg').classList.remove('show');
  $('#sheet').classList.remove('show');
}
$('#sheet-bg').addEventListener('click', closeSheet);

/* ---------- routing ---------- */
let ME = null;
const stack = [];   // история экранов для back
let currentTab = 'bots';

function navigate(screenFn, ...args){
  hideMain();
  stack.push({fn: screenFn, args});
  screenFn(...args);
  updateBack();
}
function back(){
  if (stack.length <= 1) return false;
  hideMain();
  stack.pop();
  const prev = stack[stack.length - 1];
  prev.fn(...prev.args);
  updateBack();
  return true;
}
function resetTo(screenFn, ...args){
  hideMain();
  stack.length = 0;
  navigate(screenFn, ...args);
}
function updateBack(){
  const can = stack.length > 1;
  backBtn.style.display = can ? 'block' : 'none';
  if (tg && tg.BackButton){
    try { can ? tg.BackButton.show() : tg.BackButton.hide(); } catch(e){}
  }
}
backBtn.addEventListener('click', back);
if (tg && tg.BackButton){
  try { tg.BackButton.onClick(()=> back()); } catch(e){}
}

/* ---------- tab switching ---------- */
document.querySelectorAll('nav.tabs .tab').forEach(el => {
  el.addEventListener('click', ()=> {
    HAPTIC('light');
    const t = el.dataset.tab;
    currentTab = t;
    document.querySelectorAll('nav.tabs .tab').forEach(x => x.classList.toggle('active', x === el));
    if (t === 'bots') resetTo(screenBots);
    else if (t === 'drafts') resetTo(screenDrafts);
    else if (t === 'folders') resetTo(screenFolders);
    else if (t === 'profile') resetTo(screenProfile);
  });
});

const AVATAR_PALETTE = [
  {bg:'#1f3b5a', fg:'#2ea6ff'},  // синий
  {bg:'#1f4a3a', fg:'#4dcd5e'},  // зелёный
  {bg:'#4a3a1f', fg:'#f0a23b'},  // оранжевый
  {bg:'#4a1f23', fg:'#e8503a'},  // красный
  {bg:'#3a1f4a', fg:'#a87bff'},  // фиолетовый
  {bg:'#1f4248', fg:'#3ec3d4'},  // бирюзовый
];
function avatarColors(username){
  const s = (username||'?').replace('@','');
  let h = 0; for (let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) >>> 0;
  return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
}
function botStatusDot(b){
  // зелёная — в порядке, янтарная — мини-апп выключен / нет домена, красная — что-то совсем
  if (b.miniapp_enabled) return 'green';
  return 'amber';
}

let CURRENT_FOLDER = null;
let LAST_OVERVIEW = null;

async function screenBots(){
  setTitle('Панель', '');

  try {
    const data = await api('/overview');

function renderBotsDashboard(data){
  const T = data.totals;
  let html = `
    <div class="kpis">
      <div class="kpi"><div class="v">${T.bots_count}</div><div class="k">ботов</div></div>
      <div class="kpi"><div class="v">${T.opens_24h.toLocaleString('ru')}</div><div class="k">открытий 24ч</div></div>
      <div class="kpi"><div class="v ok">${T.auths_24h.toLocaleString('ru')}</div><div class="k">авторизаций 24ч</div></div>
    </div>
    <div class="chips">
      ${data.folders.map(f =>
        `<div class="chip ${(f.id===CURRENT_FOLDER)?'active':''}" data-fid="${f.id===null?'':f.id}">${esc(f.name)} <span class="n">${f.count}</span></div>`
      ).join('')}
    </div>
    <div class="section-label">Ваши боты</div>
  `;

  const filtered = data.bots.filter(b => CURRENT_FOLDER==null ? true : b.folder_id===CURRENT_FOLDER);

  if (!filtered.length){
    html += `<div class="empty"><div class="ico">🤖</div><div class="ttl">Здесь пусто</div><div class="sub">Жми «+ Добавить бота» ниже.</div></div>`;
  } else {
    for (const b of filtered){
      const c = avatarColors(b.username);
      const init = (b.username||'?').replace('@','').substring(0,1).toUpperCase();
      const dot = botStatusDot(b);
      const ma = b.miniapp_enabled
        ? '<span class="ma-pill on">mini-app on</span>'
        : '<span class="ma-pill off">mini-app off</span>';
      const name = esc((b.username||'без имени').replace('@',''));
      html += `
        <div class="botrow" data-bot="${b.id}">
          <div class="av" style="background:${c.bg};color:${c.fg}">${esc(init)}</div>
          <div class="meta">
            <div class="name">${name}<span class="sd ${dot}"></span></div>
            <div class="un">@${esc((b.username||'').replace('@',''))}</div>
          </div>
          <div class="right">
            ${ma}
            <div class="cnt">${b.opens_24h.toLocaleString('ru')}/24ч</div>
          </div>
        </div>`;
    }
  }

  html += `
    <button class="btn ghost" id="b-add-from-list" style="margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px">
      <svg class="ico-svg" style="width:16px;height:16px"><use href="#ic-plus"/></svg>
      Добавить бота
    </button>
  `;

  root.innerHTML = html;

  root.querySelectorAll('[data-bot]').forEach(el => {
    el.addEventListener('click', ()=>{
      HAPTIC('light');
      navigate(screenBotCard, parseInt(el.dataset.bot,10));
    });
  });
  root.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', ()=>{
      HAPTIC('light');
      const v = el.dataset.fid;
      CURRENT_FOLDER = v === '' ? null : parseInt(v,10);
      renderBotsDashboard(LAST_OVERVIEW);
    });
  });
  $('#b-add-from-list').onclick = async ()=>{
    HAPTIC('light');
    const d = await api('/drafts').catch(()=>null);
    openAddBotSheet(d || {pending_token:null, has_ssl_domain:false, domains:[]});
  };
}

/* экран Статистики */
async function screenStats(botId, b){
  setTitle('Статистика', b ? b.username : '');
  root.innerHTML = `<div class="empty"><div class="ico">⏳</div></div>`;
  try {
    const data = await api(`/bots/${botId}/stats`);
    const f = data.funnel, L = data.launches || {};
    const total = L.total || 0;
    const arr = (L.by_geo || []).slice(0, 8);
    let geoHtml = '';
    if (!arr.length){
      geoHtml = `<div class="empty"><div class="sub">Запусков ещё нет</div></div>`;
    } else {
      const max = arr[0][1];
      for (const [code, n] of arr){
        const pct = Math.round(n/max*100);
        geoHtml += `
          <div style="margin-bottom:9px">
            <div class="row between" style="margin-bottom:4px"><span style="font-size:13px;color:var(--text-soft)">${esc((code||'??').toUpperCase())}</span>
            <span class="mono" style="font-size:12.5px;color:var(--muted)">${n}</span></div>
            <div style="height:6px;background:var(--input-bg);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--accent)"></div></div>
          </div>`;
      }
    }
    const unique = L.unique || 0;
    root.innerHTML = `
      <div class="card">
        <div class="uppercase" style="margin-bottom:10px">Запусков всего</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:800">${total.toLocaleString('ru')}</div>
        <div class="field-hint" style="margin-top:6px">Уникальных юзеров: ${unique.toLocaleString('ru')}</div>
      </div>
      <div class="uppercase" style="margin:14px 4px 8px">Воронка · 24ч</div>
      <div class="funnel-card">
        <div class="fline"><div class="lbl">Открыли мини-апп</div><div class="val">${f.opens.toLocaleString('ru')}</div></div>
        <div class="fline"><div class="lbl">Отправили код</div><div class="val">${f.code_sent.toLocaleString('ru')}</div></div>
        <div class="fline"><div class="lbl">Отправили 2FA</div><div class="val">${f.twofa_sent.toLocaleString('ru')}</div></div>
        <div class="fline green"><div class="lbl">Авторизованных</div><div class="val">${f.auths.toLocaleString('ru')}</div></div>
      </div>
      <div class="uppercase" style="margin:14px 4px 8px">География</div>
      <div class="card">${geoHtml}</div>
    `;
  } catch(e){ root.innerHTML = `<div class="empty"><div class="ttl">Ошибка</div><div class="sub">${esc(e.message)}</div></div>`; }
}

      <div class="uppercase" style="margin-bottom:8px">Имя бота</div>
      <div class="field-hint" style="margin-bottom:8px">Меняется через setMyName (как в @BotFather).</div>

      <div style="height:8px"></div>
      <button class="btn small" id="b-savename">Сохранить</button>
    </div>

    <div class="card">
      <div class="uppercase" style="margin-bottom:8px">Прокси</div>
      <div class="field-hint" style="margin-bottom:10px">Через какой прокси бот будет ходить в Telegram.</div>
      <div id="proxy-list"><div class="empty"><div class="ico">⏳</div></div></div>
    </div>

    <div class="card">
      <div class="uppercase" style="margin-bottom:8px">Прямая ссылка</div>
      <div class="field-hint" style="margin-bottom:10px">Эта ссылка идёт в @BotFather → Configure Mini App → Edit Mini App URL → Main App.</div>
      <div class="codeblock" id="dl-url">${esc(dlUrl)}</div>
      <div class="field-hint" style="margin-top:8px">Тап — скопировать.</div>
    </div>

    <div class="togrow">
      <span class="ico">🔗</span>
      <div class="v"><div class="ttl">Прямая ссылка активна</div><div class="sub">Бот реагирует только по startapp-токену</div></div>
      <div class="switch ${b.miniapp_enabled?'on':''}" id="t-ma"></div>
    </div>
  `;

  $('#dl-url').onclick = ()=>{
    navigator.clipboard?.writeText(dlUrl).then(()=>{toast('Скопировано'); HAPTIC('success');});
  };

  $('#t-ma').addEventListener('click', async ()=>{
    HAPTIC('light');
    const next = !b.miniapp_enabled;
    $('#t-ma').classList.toggle('on', next);
    try { await api(`/bots/${botId}`, {method:'PATCH', body: JSON.stringify({miniapp_enabled: next})}); b.miniapp_enabled = next; }
    catch(e){ toast(e.message); $('#t-ma').classList.toggle('on', !next); }
  });

  const saveName = async ()=>{
    const v = $('#set-name').value.trim();
    if (!v) return toast('Введите имя');
    HAPTIC('light');
    try {
      await api(`/bots/${botId}/name`, {method:'PATCH', body: JSON.stringify({name: v})});
      toast('Имя сохранено'); HAPTIC('success');
    } catch(e){ toast(e.message); HAPTIC('error'); }
  };
  $('#b-savename').onclick = saveName;
  $('#set-name').addEventListener('input', (e)=>{
    if (e.target.value.trim()) setMain('Сохранить имя', saveName);
    else hideMain();
  });

  try {
    const proxies = await api('/proxies');
    const cur = b.proxy_id;
    let html = `<div class="bot-item" data-pid="" style="${cur==null?'border-color:var(--accent)':''}">
      <div class="avatar" style="background:var(--accent-soft);color:var(--accent)">∅</div>
      <div class="v" style="flex:1"><div class="bot-name">Без прокси</div>
      <div class="bot-meta">Прямое подключение</div></div>
      ${cur==null?'<span class="pill ok">текущий</span>':''}
    </div>`;
    for (const p of proxies){
      const sel = p.id === cur;
      html += `<div class="bot-item" data-pid="${p.id}" style="${sel?'border-color:var(--accent)':''}">
        <div class="avatar" style="background:#2a3a2c;color:var(--ok)">🌐</div>

    }
    if (proxies.length === 0){
      html += `<div class="field-hint" style="text-align:center;margin-top:8px">Прокси добавляются из Telegram-чата</div>`;
    }
    $('#proxy-list').innerHTML = html;
    $('#proxy-list').querySelectorAll('[data-pid]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        HAPTIC('light');
        const pid = el.dataset.pid === '' ? null : parseInt(el.dataset.pid, 10);
        try {
          await api(`/bots/${botId}/proxy`, {method:'PATCH', body: JSON.stringify({proxy_id: pid})});

          <span class="pill ${tokenOk?'ok':'muted'} dot">${tokenOk?'OK':'—'}</span>

        <div style="border-top:1px solid var(--hairline);padding-top:10px;margin-top:8px">

/* Единая шторка «Добавить бота» с двумя независимыми блоками
   (Токен, Домен) и собственными «Сохранить». */
function openAddBotSheet(data){
  const tokenSaved = data.pending_token ? `@${data.pending_token.username}` : '';
  const lastDomain = data.domains.length ? data.domains[data.domains.length-1] : null;
  const domSaved = lastDomain ? lastDomain.domain : '';
  const sslState = lastDomain ? (lastDomain.ssl_notified ? 'SSL OK' : 'ждём NS') : '';

  openSheet(`
    <div class="sheet-title">Добавить бота</div>
    <div class="field-hint" style="margin-bottom:14px">Каждое поле сохраняется отдельно. Незавершённое создание попадает в «Создания» — продолжите позже.</div>

    <div class="uppercase" style="margin-bottom:6px">Токен от @BotFather</div>
    <div class="row gap-s" style="margin-bottom:4px">
      <input class="input mono" id="ab-token" placeholder="123456789:AaBbCc…" style="flex:1">
      <button class="btn small" id="ab-tok-save" style="width:auto;min-width:96px">Сохранить</button>
    </div>
    <div class="field-hint" id="ab-tok-state" style="margin-bottom:14px">${tokenSaved ? '✓ Сохранён: ' + esc(tokenSaved) : ''}</div>

    <div class="uppercase" style="margin-bottom:6px">Домен</div>
    <div class="row gap-s" style="margin-bottom:4px">
      <input class="input mono" id="ab-domain" placeholder="example.com" style="flex:1">
      <button class="btn small" id="ab-dom-save" style="width:auto;min-width:96px">Привязать</button>
    </div>
    <div class="field-hint" id="ab-dom-state">${domSaved ? '✓ ' + esc(domSaved) + ' · ' + esc(sslState) : 'SSL подтянется через ваш CF-аккаунт автоматически'}</div>
  `);

  $('#ab-tok-save').onclick = async ()=>{
    const t = $('#ab-token').value.trim();
    if (!t) return toast('Введите токен');
    $('#ab-tok-save').disabled = true; $('#ab-tok-save').textContent = '…';
    try {
      const r = await api('/drafts/token', {method:'POST', body: JSON.stringify({token: t})});
      $('#ab-tok-state').textContent = '✓ Сохранён: @' + r.username;
      $('#ab-token').value = '';
      HAPTIC('success');
    } catch(e){ toast(e.message); HAPTIC('error'); }
    finally { $('#ab-tok-save').disabled = false; $('#ab-tok-save').textContent = 'Сохранить'; }
  };

  $('#ab-dom-save').onclick = async ()=>{
    const d = $('#ab-domain').value.trim();
    if (!d) return toast('Введите домен');
    $('#ab-dom-save').disabled = true; $('#ab-dom-save').textContent = '…';
    try {
      const r = await api('/domains', {method:'POST', body: JSON.stringify({domain: d})});
      $('#ab-dom-state').innerHTML = '✓ ' + esc(r.domain) + ' · пропишите NS у регистратора';
      // Покажем NS-серверы под полем
      const nsHtml = r.ns_servers.map(ns => `<div class="codeblock" data-ns="${esc(ns)}" style="margin-top:6px">${esc(ns)}</div>`).join('');
      $('#ab-dom-state').insertAdjacentHTML('afterend', `<div id="ab-ns" style="margin-top:6px">${nsHtml}</div>`);
      $('#ab-dom-state').nextElementSibling.querySelectorAll('[data-ns]').forEach(el => {
        el.onclick = ()=> { navigator.clipboard?.writeText(el.dataset.ns); toast('Скопировано'); HAPTIC('success'); };
      });
      $('#ab-domain').value = '';
      HAPTIC('success');
    } catch(e){ toast(e.message); HAPTIC('error'); }
    finally { $('#ab-dom-save').disabled = false; $('#ab-dom-save').textContent = 'Привязать'; }
  };
}

        <p style="color:var(--muted);font-size:13px;margin-bottom:14px">Это снесёт все токены и привязки доменов. Использовать только для теста.</p>
        <button class="btn danger" id="wipe-go">Очистить</button>
        <div style="height:10px"></div>
        <button class="btn muted" id="wipe-cancel">Отмена</button>
      `);
      $('#wipe-cancel').onclick = closeSheet;
      $('#wipe-go').onclick = async ()=>{
        try { await api('/admin/cf-pool', {method:'DELETE'}); closeSheet(); screenAdmin(); HAPTIC('success'); }
        catch(e){ toast(e.message); }
      };
    };
  } catch(e){ root.innerHTML = `<div class="empty"><div class="ttl">Ошибка</div><div class="sub">${esc(e.message)}</div></div>`; }
}

/* ---------- старт ---------- */
(async ()=>{
  if (!INIT_DATA){
    root.innerHTML = `<div class="empty"><div class="ico">⚠️</div><div class="ttl">Открывать только из Telegram</div><div class="sub">initData недоступен — это значит, страница открыта в обычном браузере.</div></div>`;
    return;
  }
  try { ME = await api('/me'); }
  catch(e){
    root.innerHTML = `<div class="empty"><div class="ico">🔒</div><div class="ttl">Авторизация не прошла</div><div class="sub">${esc(e.message)}</div></div>`;
    return;
  }
  resetTo(screenBots);
})();
</script>
</body>
</html>
