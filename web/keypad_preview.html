<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Превью — ввод кода</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #17212b; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --tg-theme-button-color: #4aa0e0;
  }
  body { display: flex; justify-content: center; padding: 24px 16px; }
  .card {
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; align-items: stretch;
  }
  .text {
    background: rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px 16px;
    text-align: center; font-size: 15px; line-height: 1.35;
    margin: 8px 0;
  }
  .muted { text-align: center; font-size: 13px; opacity: .8; }
  .btn {
    border: none; border-radius: 12px; padding: 14px;
    font-size: 16px; font-weight: 600; color: #fff;
    background: var(--tg-theme-button-color, #4aa0e0);
    cursor: pointer; margin-top: 6px; width: 100%;
  }
  .step { text-align: center; font-size: 12px; opacity: .5; margin-top: 12px; }

  /* --- Анимированный телефон --- */
  .phone-anim { display:flex; justify-content:center; margin:4px 0 2px; }
  .phone-anim svg { animation: floaty 2.6s ease-in-out infinite; }
  @keyframes floaty {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50%     { transform: translateY(-10px) rotate(4deg); }
  }

  /* --- Ячейки кода --- */
  .codecells { display:flex; gap:10px; justify-content:center; margin:16px 0; }
  .codecell {
    width:46px; height:56px; border-radius:12px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.20);
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:700;
  }
  .codecell.filled { border-color: var(--tg-theme-button-color, #4aa0e0); }

  /* --- Кастомная клавиатура --- */
  .keypad {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:10px; margin-top:14px;
  }
  .key {
    padding:16px 0; border-radius:12px; text-align:center;
    font-size:22px; font-weight:600; cursor:pointer;
    user-select:none; -webkit-user-select:none;
    background: var(--tg-theme-button-color, #4aa0e0); color:#fff;
  }
  .key:active { filter:brightness(0.88); }
  .key-empty { background:transparent; cursor:default; }
</style>
</head>
<body>
  <div class="card" id="root"></div>

<script>
  var CODE_LEN = 5;
  var codeBuf = "";
  var root = document.getElementById("root");

  function phoneAnimHTML() {
    return '<div class="phone-anim">'
      + '<svg width="84" height="116" viewBox="0 0 84 116" fill="none">'
      + '<rect x="8" y="3" width="68" height="110" rx="16" fill="#3a3f47"/>'
      + '<rect x="14" y="13" width="56" height="90" rx="8" fill="#0e1621"/>'
      + '<circle cx="42" cy="58" r="21" fill="#37aee2"/>'
      + '<path d="M31 58 L54 49 L48 71 L43 63 L31 58 Z" fill="#fff"/>'
      + '</svg></div>';
  }

  function codeCellsHTML() {
    var cells = "";
    for (var i = 0; i < CODE_LEN; i++) {
      var ch = codeBuf[i] || "";
      cells += '<div class="codecell' + (ch ? " filled" : "") + '">' + ch + '</div>';
    }
    return '<div class="codecells">' + cells + '</div>';
  }

  function keypadHTML() {
    var rows = [["1","2","3"],["4","5","6"],["7","8","9"],["","0","back"]];
    var h = '<div class="keypad">';
    for (var r = 0; r < rows.length; r++) {
      for (var c = 0; c < rows[r].length; c++) {
        var k = rows[r][c];
        if (k === "") h += '<div class="key key-empty"></div>';
        else if (k === "back") h += '<div class="key" data-k="back">⌫</div>';
        else h += '<div class="key" data-k="' + k + '">' + k + '</div>';
      }
    }
    return h + '</div>';
  }

  function updateCells() {
    var cells = document.querySelectorAll(".codecell");
    for (var i = 0; i < cells.length; i++) {
      var ch = codeBuf[i] || "";
      cells[i].textContent = ch;
      if (ch) cells[i].classList.add("filled");
      else cells[i].classList.remove("filled");
    }
  }

  function onKey(k) {
    if (k === "back") codeBuf = codeBuf.slice(0, -1);
    else if (codeBuf.length < CODE_LEN) codeBuf += k;
    updateCells();
    if (codeBuf.length === CODE_LEN) {
      // в реальном приложении тут авто-отправка кода
      setTimeout(function () {
        alert("Код введён: " + codeBuf + "\n(в приложении он отправится автоматически)");
        codeBuf = ""; updateCells();
      }, 120);
    }
  }

  function render() {
    var out = phoneAnimHTML();
    out += '<div class="text">Введите 5-значный код, который мы вам только что отправили!</div>';
    out += codeCellsHTML();
    out += '<button class="btn" id="getcode">Узнать код</button>';
    out += keypadHTML();
    out += '<div class="step">2 / 3</div>';
    root.innerHTML = out;
    var keys = document.querySelectorAll(".key[data-k]");
    for (var n = 0; n < keys.length; n++) {
      (function (el) { el.onclick = function () { onKey(el.getAttribute("data-k")); }; })(keys[n]);
    }
    document.getElementById("getcode").onclick = function () {
      alert("«Узнать код» — здесь открывается твоя ссылка-ресурс");
    };
  }

  render();
</script>
</body>
</html>
