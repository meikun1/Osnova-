name: Deploy

# Деплоим при каждом пуше в ветку design/hacker-theme
on:
  push:
    branches:
      - design/hacker-theme

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Перед выкаткой проверяем, что код хотя бы компилируется
  checks:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile (syntax check)
        run: python -m compileall -q .

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    # Деплой стартует только если проверки прошли
    needs: checks
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          # Ветка, которую разворачиваем на сервере
          envs: BRANCH
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "==> Деплой ветки $BRANCH"
            git fetch --all --prune
            git checkout --force "$BRANCH"
            git reset --hard "origin/$BRANCH"
            docker compose up -d --build
            docker image prune -f
            docker compose ps
        env:
          BRANCH: ${{ github.ref_name }}
